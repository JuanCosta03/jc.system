<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JCSystem | Área Familiar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; color: #1a1a2e; }
        .dashboard-header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; color: #0000FF; }
        .logout-btn { background: none; border: 1px solid #ddd; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .logout-btn:hover { background: #0000FF; color: white; }
        .dashboard-container { max-width: 1400px; margin: 30px auto; padding: 0 24px; }
        .profiles-section { margin-bottom: 40px; }
        .profiles-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .profiles-carousel { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; }
        .profile-card, .add-profile-card { flex: 0 0 140px; text-align: center; cursor: pointer; transition: transform 0.2s, opacity 0.2s; opacity: 0.8; scroll-snap-align: start; position: relative; }
        .profile-card.active { opacity: 1; transform: scale(1.05); }
        .profile-avatar, .add-profile-avatar { width: 130px; height: 130px; background: linear-gradient(145deg, #0000FF, #3366FF); border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; color: white; font-size: 56px; font-weight: 500; box-shadow: 0 10px 20px rgba(0,0,255,0.2); position: relative; background-size: cover; background-position: center; }
        .add-profile-avatar { background: #e2e8f0; color: #6c757d; font-size: 48px; border: 2px dashed #cbd5e1; }
        .edit-photo-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-size: 14px; }
        .profile-card.active .profile-avatar { box-shadow: 0 0 0 4px white, 0 0 0 8px #0000FF; }
        .profile-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; }
        .profile-role { font-size: 12px; color: #6c757d; }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; background: white; padding: 8px 16px; border-radius: 60px; width: fit-content; }
        .tab-btn { background: none; border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; color: #4a5568; }
        .tab-btn.active { background: #0000FF; color: white; }
        .tab-content { background: white; border-radius: 28px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); min-height: 500px; }
        .loading { text-align: center; padding: 60px; color: #6c757d; }
        .empty-state { text-align: center; padding: 60px; color: #6c757d; }
        .empty-state i { font-size: 64px; margin-bottom: 20px; color: #0000FF; }
        /* Modal para criar/editar perfil */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 32px; padding: 32px; max-width: 450px; width: 90%; }
        .modal-content h3 { margin-bottom: 20px; text-align: center; }
        .modal-content input, .modal-content select { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #ddd; border-radius: 16px; font-size: 16px; }
        .photo-options { display: flex; gap: 12px; margin-bottom: 16px; }
        .photo-options button { flex: 1; padding: 10px; border: 1px solid #ddd; background: white; border-radius: 40px; cursor: pointer; }
        .photo-options button.active { background: #0000FF; color: white; border-color: #0000FF; }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .modal-buttons button { padding: 10px 20px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-save { background: #0000FF; color: white; }
        .btn-cancel { background: #e2e8f0; color: #1a1a2e; }
        @media (max-width: 768px) {
            .profile-card, .add-profile-card { flex: 0 0 100px; }
            .profile-avatar, .add-profile-avatar { width: 90px; height: 90px; font-size: 40px; }
            .tabs { width: 100%; justify-content: center; }
            .tab-btn { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="logo"><i class="fas fa-cube"></i> JCSystem Familiar</div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
    <div class="dashboard-container">
        <div class="profiles-section">
            <div class="profiles-title"><i class="fas fa-users"></i> Quem está usando?</div>
            <div class="profiles-carousel" id="profilesScroll"></div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="visao">Visão Geral</button>
            <button class="tab-btn" data-tab="transacoes">Transações</button>
            <button class="tab-btn" data-tab="calendario">Calendário</button>
        </div>
        <div id="tabContent" class="tab-content"><div class="loading">Carregando...</div></div>
    </div>

    <!-- Modal para criar/editar perfil -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Novo Perfil</h3>
            <input type="text" id="profileName" placeholder="Nome do perfil (ex: João)">
            <input type="text" id="profileRole" placeholder="Papel (ex: Pai, Filho, Amigo)">
            <div class="photo-options">
                <button id="optFile" class="active">📁 Enviar arquivo</button>
                <button id="optUrl">🌐 URL da web</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <input type="text" id="urlInput" placeholder="https://exemplo.com/foto.jpg" style="display:none;">
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-save">Salvar</button>
                <button id="cancelModalBtn" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Verificação de login
        let currentUser = getCurrentUser();
        if (!currentUser) window.location.href = 'login.html';

        // Carregar perfis do localStorage (inicialmente vazio)
        let profiles = [];
        let selectedProfileId = null;

        function loadProfiles() {
            const stored = localStorage.getItem(`profiles_${currentUser.id}`);
            if (stored) {
                profiles = JSON.parse(stored);
            } else {
                profiles = []; // nenhum perfil inicialmente
                saveProfiles();
            }
            // Se não houver nenhum perfil, o selectedProfileId fica null
            if (profiles.length > 0 && !selectedProfileId) {
                selectedProfileId = profiles[0].id;
            } else if (profiles.length === 0) {
                selectedProfileId = null;
            }
        }

        function saveProfiles() {
            localStorage.setItem(`profiles_${currentUser.id}`, JSON.stringify(profiles));
            // Marcar que o usuário tem dados
            const users = JSON.parse(localStorage.getItem(USERS_KEY));
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1 && profiles.length > 0) {
                users[userIndex].hasData = true;
                localStorage.setItem(USERS_KEY, JSON.stringify(users));
            }
        }

        // Renderizar perfis (incluindo botão +)
        function renderProfiles() {
            const container = document.getElementById('profilesScroll');
            if (!container) return;
            let html = '';
            profiles.forEach(p => {
                const avatarStyle = p.photo ? `background-image: url('${p.photo}'); background-size: cover; background-position: center;` : `background: linear-gradient(145deg, ${p.color}, ${p.color}cc); display: flex; align-items: center; justify-content: center;`;
                html += `
                    <div class="profile-card ${selectedProfileId === p.id ? 'active' : ''}" data-id="${p.id}">
                        <div class="profile-avatar" style="${avatarStyle}">
                            ${!p.photo ? p.emoji : ''}
                            <button class="edit-photo-btn" data-id="${p.id}"><i class="fas fa-pencil-alt"></i></button>
                        </div>
                        <div class="profile-name">${p.name}</div>
                        <div class="profile-role">${p.role}</div>
                    </div>
                `;
            });
            html += `
                <div class="add-profile-card" id="addProfileBtn">
                    <div class="add-profile-avatar"><i class="fas fa-plus"></i></div>
                    <div class="add-profile-name">Adicionar Perfil</div>
                </div>
            `;
            container.innerHTML = html;

            // Eventos de clique nos perfis
            document.querySelectorAll('.profile-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('edit-photo-btn')) return;
                    selectedProfileId = card.dataset.id;
                    renderProfiles();
                    loadCurrentTab();
                });
            });

            // Edição de foto
            document.querySelectorAll('.edit-photo-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const profileId = btn.dataset.id;
                    openEditPhotoModal(profileId);
                });
            });

            // Botão adicionar perfil
            const addBtn = document.getElementById('addProfileBtn');
            if (addBtn) addBtn.addEventListener('click', () => openModal());
        }

        // Modal de criação/edição de perfil (nome, papel, foto)
        let currentEditingId = null;
        let currentPhotoMethod = 'file'; // 'file' ou 'url'

        function openModal(profile = null) {
            const modal = document.getElementById('profileModal');
            const modalTitle = document.getElementById('modalTitle');
            const profileName = document.getElementById('profileName');
            const profileRole = document.getElementById('profileRole');
            const fileInput = document.getElementById('fileInput');
            const urlInput = document.getElementById('urlInput');
            const optFile = document.getElementById('optFile');
            const optUrl = document.getElementById('optUrl');

            if (profile) {
                modalTitle.innerText = 'Editar Perfil';
                profileName.value = profile.name;
                profileRole.value = profile.role;
                currentEditingId = profile.id;
            } else {
                modalTitle.innerText = 'Novo Perfil';
                profileName.value = '';
                profileRole.value = '';
                currentEditingId = null;
            }
            // Resetar campos de foto
            fileInput.value = '';
            urlInput.value = '';
            currentPhotoMethod = 'file';
            optFile.classList.add('active');
            optUrl.classList.remove('active');
            fileInput.style.display = 'block';
            urlInput.style.display = 'none';
            modal.style.display = 'flex';
        }

        function openEditPhotoModal(profileId) {
            const profile = profiles.find(p => p.id === profileId);
            if (profile) openModal(profile);
        }

        // Alternar método de foto
        document.getElementById('optFile')?.addEventListener('click', () => {
            currentPhotoMethod = 'file';
            document.getElementById('optFile').classList.add('active');
            document.getElementById('optUrl').classList.remove('active');
            document.getElementById('fileInput').style.display = 'block';
            document.getElementById('urlInput').style.display = 'none';
        });
        document.getElementById('optUrl')?.addEventListener('click', () => {
            currentPhotoMethod = 'url';
            document.getElementById('optUrl').classList.add('active');
            document.getElementById('optFile').classList.remove('active');
            document.getElementById('fileInput').style.display = 'none';
            document.getElementById('urlInput').style.display = 'block';
        });

        // Salvar perfil (criação ou edição)
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const name = document.getElementById('profileName').value.trim();
            const role = document.getElementById('profileRole').value.trim();
            if (!name) {
                alert('Digite um nome para o perfil');
                return;
            }
            let photo = null;
            if (currentPhotoMethod === 'file') {
                const fileInput = document.getElementById('fileInput');
                if (fileInput.files && fileInput.files[0]) {
                    photo = await readFileAsDataURL(fileInput.files[0]);
                }
            } else {
                const url = document.getElementById('urlInput').value.trim();
                if (url) photo = url;
            }
            if (currentEditingId) {
                // Editar existente
                const profile = profiles.find(p => p.id === currentEditingId);
                if (profile) {
                    profile.name = name;
                    profile.role = role || 'Perfil';
                    if (photo) profile.photo = photo;
                    saveProfiles();
                }
            } else {
                // Criar novo
                const colors = ['#0984e3', '#00b894', '#fdcb6e', '#e17055', '#6c5ce7', '#e84393', '#2c3e66'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const emojis = ['😊', '😎', '🧑', '👩', '👨', '👧', '👦', '🐶', '🐱'];
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                profiles.push({
                    id: Date.now().toString(),
                    name: name,
                    role: role || 'Perfil',
                    emoji: randomEmoji,
                    color: randomColor,
                    photo: photo || null
                });
                saveProfiles();
            }
            document.getElementById('profileModal').style.display = 'none';
            renderProfiles();
            // Se não havia nenhum perfil antes, agora há, recarregar abas
            if (profiles.length === 1) {
                selectedProfileId = profiles[0].id;
                loadCurrentTab();
            }
        });

        document.getElementById('cancelModalBtn')?.addEventListener('click', () => {
            document.getElementById('profileModal').style.display = 'none';
        });

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // Carregar conteúdo das abas (visao-geral.html, transacoes.html, calendario.html)
        async function loadTabContent(tabId) {
            const contentDiv = document.getElementById('tabContent');
            contentDiv.innerHTML = '<div class="loading">Carregando...</div>';
            let url = '';
            if (tabId === 'visao') url = 'visao-geral.html';
            else if (tabId === 'transacoes') url = 'transacoes.html';
            else if (tabId === 'calendario') url = 'calendario.html';
            try {
                const response = await fetch(`${url}?profile=${selectedProfileId || ''}&_=${Date.now()}`);
                if (!response.ok) throw new Error();
                const html = await response.text();
                contentDiv.innerHTML = html;
                const scripts = contentDiv.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
            } catch (error) {
                if (profiles.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-user-plus"></i>
                            <h3>Nenhum perfil criado ainda</h3>
                            <p>Clique em "Adicionar Perfil" para começar a organizar suas finanças.</p>
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = '<div class="loading">Erro ao carregar. Verifique os arquivos: visao-geral.html, transacoes.html, calendario.html</div>';
                }
            }
        }

        function loadCurrentTab() {
            const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
            loadTabContent(activeTab);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadCurrentTab();
            });
        });

        document.getElementById('logoutBtn').onclick = () => { logout(); window.location.href = 'index.html'; };

        loadProfiles();
        renderProfiles();
        if (profiles.length > 0) loadCurrentTab();
        else {
            document.getElementById('tabContent').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-user-plus"></i>
                    <h3>Bem-vindo ao JCSystem!</h3>
                    <p>Para começar, clique em "Adicionar Perfil" e crie o primeiro perfil da sua família.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
