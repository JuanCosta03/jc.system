<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JCSystem | Área Familiar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1a1a2e;
        }
        .dashboard-header {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #0000FF;
        }
        .logout-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: #0000FF;
            color: white;
            border-color: #0000FF;
        }
        .dashboard-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 24px;
        }
        /* Perfis - cards menores e sem corte lateral */
        .profiles-section {
            margin-bottom: 40px;
            overflow: visible;
        }
        .profiles-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profiles-carousel {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            overflow-y: visible;
            padding: 10px 0 20px 16px;  /* Espaço à esquerda para não cortar o primeiro card */
            scroll-snap-type: x mandatory;
            margin: 0;
            scrollbar-width: thin;
            scrollbar-color: #0000FF #e2e8f0;
        }
        /* Espaço extra no final para não cortar o último card */
        .profiles-carousel::after {
            content: '';
            flex: 0 0 16px;
        }
        .profile-card {
            flex: 0 0 110px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            opacity: 0.8;
            scroll-snap-align: start;
            position: relative;
            overflow: visible;
        }
        .profile-card.active {
            opacity: 1;
            transform: scale(1.05);
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #0000FF, #3366FF);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
            font-size: 42px;
            font-weight: 500;
            box-shadow: 0 8px 16px rgba(0,0,255,0.2);
            position: relative;
            background-size: cover;
            background-position: center;
            overflow: visible;
        }
        .edit-photo-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 12px;
            transition: 0.2s;
        }
        .edit-photo-btn:hover {
            background: #0000FF;
        }
        .delete-profile-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #c62828;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 10px;
            z-index: 2;
            transition: 0.2s;
        }
        .delete-profile-btn:hover {
            background: #b71c1c;
            transform: scale(1.1);
        }
        .profile-card.active .profile-avatar {
            box-shadow: 0 0 0 3px white, 0 0 0 6px #0000FF;
        }
        .profile-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }
        .profile-role {
            font-size: 11px;
            color: #6c757d;
        }
        .add-profile-card {
            flex: 0 0 110px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            scroll-snap-align: start;
        }
        .add-profile-avatar {
            width: 100px;
            height: 100px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: #6c757d;
            font-size: 38px;
            border: 2px dashed #cbd5e1;
            transition: 0.2s;
        }
        .add-profile-card:hover .add-profile-avatar {
            background: #cbd5e1;
            color: #0000FF;
        }
        .add-profile-name {
            font-weight: 500;
            font-size: 14px;
            color: #6c757d;
        }
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            padding: 8px 16px;
            border-radius: 60px;
            width: fit-content;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #4a5568;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #0000FF;
            color: white;
        }
        .tab-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            min-height: 500px;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
        }
        /* Modais */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 450px;
            width: 90%;
        }
        .modal-content h3 {
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
        }
        .photo-options {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .photo-options button {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 40px;
            cursor: pointer;
        }
        .photo-options button.active {
            background: #0000FF;
            color: white;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }
        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-save {
            background: #0000FF;
            color: white;
        }
        .btn-cancel {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .btn-confirm {
            background: #c62828;
            color: white;
        }
        @media (max-width: 768px) {
            .profile-card, .add-profile-card { flex: 0 0 90px; }
            .profile-avatar, .add-profile-avatar { width: 80px; height: 80px; font-size: 32px; }
            .profile-name, .add-profile-name { font-size: 12px; }
            .edit-photo-btn { width: 24px; height: 24px; font-size: 10px; bottom: 2px; right: 2px; }
            .delete-profile-btn { width: 20px; height: 20px; font-size: 8px; top: -4px; right: -4px; }
            .tabs { width: 100%; justify-content: center; }
            .tab-btn { padding: 8px 16px; font-size: 14px; }
            .profiles-carousel {
                padding-left: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="logo"><i class="fas fa-cube"></i> JCSystem Familiar</div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
    <div class="dashboard-container">
        <div class="profiles-section">
            <div class="profiles-title"><i class="fas fa-users"></i> Quem está usando?</div>
            <div class="profiles-carousel" id="profilesScroll"></div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="visao">Visão Geral</button>
            <button class="tab-btn" data-tab="transacoes">Transações</button>
            <button class="tab-btn" data-tab="calendario">Calendário</button>
        </div>
        <div id="tabContent" class="tab-content"><div class="loading">Carregando...</div></div>
    </div>

    <!-- Modal de criação/edição de perfil -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Novo Perfil</h3>
            <input type="text" id="profileName" placeholder="Nome do perfil (ex: João)">
            <input type="text" id="profileRole" placeholder="Papel (ex: Pai, Filho)">
            <div class="photo-options">
                <button id="optFile" class="active">📁 Enviar arquivo</button>
                <button id="optUrl">🌐 URL da web</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none;">
            <input type="text" id="urlInput" placeholder="https://exemplo.com/foto.jpg" style="display:none;">
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-save">Salvar</button>
                <button id="cancelModalBtn" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal de confirmação de exclusão -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>Excluir Perfil</h3>
            <p>Tem certeza que deseja excluir o perfil <strong id="profileToDeleteName"></strong>?</p>
            <p style="font-size:12px; color:#c62828;">Esta ação é irreversível e todas as transações associadas também serão removidas.</p>
            <div class="modal-buttons">
                <button id="confirmDeleteBtn" class="btn-confirm">Excluir</button>
                <button id="cancelDeleteBtn" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // ==================== VERIFICAÇÃO DE LOGIN ====================
        let currentUser = getCurrentUser();
        if (!currentUser) window.location.href = 'login.html';

        // ==================== DADOS ====================
        let profiles = [];
        let selectedProfileId = null;
        let currentEditingId = null;
        let currentPhotoMethod = 'file';

        // ==================== FUNÇÕES DE PERSISTÊNCIA ====================
        function loadProfiles() {
            const stored = localStorage.getItem(`profiles_${currentUser.id}`);
            if (stored) {
                profiles = JSON.parse(stored);
            } else {
                profiles = [];
                saveProfiles();
            }
            if (profiles.length > 0 && !selectedProfileId) {
                selectedProfileId = profiles[0].id;
            } else if (profiles.length === 0) {
                selectedProfileId = null;
            }
        }

        function saveProfiles() {
            localStorage.setItem(`profiles_${currentUser.id}`, JSON.stringify(profiles));
        }

        function getTransactions() {
            const stored = localStorage.getItem(`transactions_${currentUser.id}`);
            return stored ? JSON.parse(stored) : [];
        }

        function saveTransactions(transactions) {
            localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(transactions));
        }

        // ==================== RENDERIZAR PERFIS ====================
        function renderProfiles() {
            const container = document.getElementById('profilesScroll');
            if (!container) return;
            let html = '';
            profiles.forEach(p => {
                const avatarStyle = p.photo ? `background-image: url('${p.photo}'); background-size: cover; background-position: center;` : `background: linear-gradient(145deg, ${p.color}, ${p.color}cc); display: flex; align-items: center; justify-content: center;`;
                html += `
                    <div class="profile-card ${selectedProfileId === p.id ? 'active' : ''}" data-id="${p.id}">
                        <button class="delete-profile-btn" data-id="${p.id}" data-name="${p.name}"><i class="fas fa-trash-alt"></i></button>
                        <div class="profile-avatar" style="${avatarStyle}">
                            ${!p.photo ? p.emoji : ''}
                            <button class="edit-photo-btn" data-id="${p.id}"><i class="fas fa-pencil-alt"></i></button>
                        </div>
                        <div class="profile-name">${p.name}</div>
                        <div class="profile-role">${p.role}</div>
                    </div>
                `;
            });
            html += `
                <div class="add-profile-card" id="addProfileBtn">
                    <div class="add-profile-avatar"><i class="fas fa-plus"></i></div>
                    <div class="add-profile-name">Adicionar Perfil</div>
                </div>
            `;
            container.innerHTML = html;

            // Selecionar perfil
            document.querySelectorAll('.profile-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-profile-btn') || e.target.classList.contains('edit-photo-btn')) return;
                    selectedProfileId = card.dataset.id;
                    renderProfiles();
                    loadCurrentTab();
                });
            });

            // Excluir perfil
            document.querySelectorAll('.delete-profile-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const profileId = btn.dataset.id;
                    const profileName = btn.dataset.name;
                    document.getElementById('profileToDeleteName').innerText = profileName;
                    document.getElementById('confirmModal').style.display = 'flex';
                    window.pendingDeleteId = profileId;
                });
            });

            // Editar foto
            document.querySelectorAll('.edit-photo-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const profileId = btn.dataset.id;
                    const profile = profiles.find(p => p.id === profileId);
                    if (profile) openEditPhotoModal(profile);
                });
            });

            // Adicionar perfil
            document.getElementById('addProfileBtn')?.addEventListener('click', () => openModal());
        }

        // ==================== MODAL DE CRIAÇÃO/EDIÇÃO ====================
        function openModal(profile = null) {
            const modal = document.getElementById('profileModal');
            const modalTitle = document.getElementById('modalTitle');
            const nameInput = document.getElementById('profileName');
            const roleInput = document.getElementById('profileRole');
            const fileInput = document.getElementById('fileInput');
            const urlInput = document.getElementById('urlInput');
            const optFile = document.getElementById('optFile');
            const optUrl = document.getElementById('optUrl');

            if (profile) {
                modalTitle.innerText = 'Editar Perfil';
                nameInput.value = profile.name;
                roleInput.value = profile.role;
                currentEditingId = profile.id;
            } else {
                modalTitle.innerText = 'Novo Perfil';
                nameInput.value = '';
                roleInput.value = '';
                currentEditingId = null;
            }
            fileInput.value = '';
            urlInput.value = '';
            currentPhotoMethod = 'file';
            optFile.classList.add('active');
            optUrl.classList.remove('active');
            fileInput.style.display = 'block';
            urlInput.style.display = 'none';
            modal.style.display = 'flex';
        }

        function openEditPhotoModal(profile) {
            openModal(profile);
        }

        // Alternar método de foto
        document.getElementById('optFile')?.addEventListener('click', () => {
            currentPhotoMethod = 'file';
            document.getElementById('optFile').classList.add('active');
            document.getElementById('optUrl').classList.remove('active');
            document.getElementById('fileInput').style.display = 'block';
            document.getElementById('urlInput').style.display = 'none';
        });
        document.getElementById('optUrl')?.addEventListener('click', () => {
            currentPhotoMethod = 'url';
            document.getElementById('optUrl').classList.add('active');
            document.getElementById('optFile').classList.remove('active');
            document.getElementById('fileInput').style.display = 'none';
            document.getElementById('urlInput').style.display = 'block';
        });

        // Salvar perfil
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const name = document.getElementById('profileName').value.trim();
            const role = document.getElementById('profileRole').value.trim();
            if (!name) {
                alert('Digite um nome para o perfil');
                return;
            }
            let photo = null;
            if (currentPhotoMethod === 'file') {
                const fileInput = document.getElementById('fileInput');
                if (fileInput.files && fileInput.files[0]) {
                    photo = await readFileAsDataURL(fileInput.files[0]);
                }
            } else {
                const url = document.getElementById('urlInput').value.trim();
                if (url) photo = url;
            }
            if (currentEditingId) {
                const profile = profiles.find(p => p.id === currentEditingId);
                if (profile) {
                    profile.name = name;
                    profile.role = role || 'Perfil';
                    if (photo) profile.photo = photo;
                    saveProfiles();
                }
            } else {
                const colors = ['#0984e3', '#00b894', '#fdcb6e', '#e17055', '#6c5ce7', '#e84393', '#2c3e66'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const emojis = ['😊', '😎', '🧑', '👩', '👨', '👧', '👦', '🐶', '🐱'];
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                profiles.push({
                    id: Date.now().toString(),
                    name: name,
                    role: role || 'Perfil',
                    emoji: randomEmoji,
                    color: randomColor,
                    photo: photo || null
                });
                saveProfiles();
            }
            document.getElementById('profileModal').style.display = 'none';
            renderProfiles();
            if (profiles.length === 1) {
                selectedProfileId = profiles[0].id;
                loadCurrentTab();
            }
        });

        document.getElementById('cancelModalBtn')?.addEventListener('click', () => {
            document.getElementById('profileModal').style.display = 'none';
        });

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        // ==================== MODAL DE EXCLUSÃO ====================
        document.getElementById('confirmDeleteBtn')?.addEventListener('click', () => {
            const profileId = window.pendingDeleteId;
            if (profileId) {
                profiles = profiles.filter(p => p.id !== profileId);
                saveProfiles();
                let transactions = getTransactions();
                transactions = transactions.filter(t => t.perfilId !== profileId);
                saveTransactions(transactions);
                if (selectedProfileId === profileId) {
                    selectedProfileId = profiles.length > 0 ? profiles[0].id : null;
                }
                renderProfiles();
                loadCurrentTab();
            }
            document.getElementById('confirmModal').style.display = 'none';
        });
        document.getElementById('cancelDeleteBtn')?.addEventListener('click', () => {
            document.getElementById('confirmModal').style.display = 'none';
        });
        window.onclick = (event) => {
            const confirmModal = document.getElementById('confirmModal');
            const profileModal = document.getElementById('profileModal');
            if (event.target === confirmModal) confirmModal.style.display = 'none';
            if (event.target === profileModal) profileModal.style.display = 'none';
        };

        // ==================== CARREGAR ABAS ====================
        async function loadTabContent(tabId) {
            const contentDiv = document.getElementById('tabContent');
            contentDiv.innerHTML = '<div class="loading">Carregando...</div>';
            let url = '';
            if (tabId === 'visao') url = 'visao-geral.html';
            else if (tabId === 'transacoes') url = 'transacoes.html';
            else if (tabId === 'calendario') url = 'calendario.html';
            try {
                const response = await fetch(`${url}?profile=${selectedProfileId || ''}&_=${Date.now()}`);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const html = await response.text();
                contentDiv.innerHTML = html;
                const scripts = contentDiv.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
            } catch (error) {
                if (profiles.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-user-plus" style="font-size:48px; color:#0000FF;"></i>
                            <h3>Bem-vindo ao JCSystem!</h3>
                            <p>Para começar, clique em "Adicionar Perfil" e crie o primeiro perfil da sua família.</p>
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = '<div class="loading">Erro ao carregar. Verifique os arquivos: visao-geral.html, transacoes.html, calendario.html</div>';
                }
            }
        }

        function loadCurrentTab() {
            const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
            loadTabContent(activeTab);
        }

        // ==================== EVENTOS DAS ABAS ====================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadCurrentTab();
            });
        });

        // ==================== LOGOUT ====================
        document.getElementById('logoutBtn').onclick = () => {
            logout();
            window.location.href = 'index.html';
        };

        // ==================== INICIALIZAÇÃO ====================
        loadProfiles();
        renderProfiles();
        if (profiles.length > 0) {
            loadCurrentTab();
        } else {
            document.getElementById('tabContent').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-user-plus" style="font-size:48px; color:#0000FF;"></i>
                    <h3>Bem-vindo ao JCSystem!</h3>
                    <p>Para começar, clique em "Adicionar Perfil" e crie o primeiro perfil da sua família.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
