<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JCSystem | Área Familiar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f2f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #1a1a2e;
        }

        /* Header */
        .dashboard-header {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #0000FF;
        }

        .logout-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: #0000FF;
            color: white;
            border-color: #0000FF;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 24px;
        }

        /* Perfis estilo Netflix */
        .profiles-section {
            margin-bottom: 40px;
        }

        .profiles-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profiles-carousel {
            display: flex;
            gap: 24px;
            overflow-x: auto;
            scrollbar-width: thin;
            padding-bottom: 16px;
            scroll-snap-type: x mandatory;
        }

        .profile-card {
            flex: 0 0 140px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            opacity: 0.8;
            scroll-snap-align: start;
            position: relative;
        }

        .profile-card.active {
            opacity: 1;
            transform: scale(1.05);
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            background: linear-gradient(145deg, #0000FF, #3366FF);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: white;
            font-size: 56px;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0,0,255,0.2);
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .edit-photo-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }

        .edit-photo-btn:hover {
            background: #0000FF;
        }

        .profile-card.active .profile-avatar {
            box-shadow: 0 0 0 4px white, 0 0 0 8px #0000FF;
        }

        .profile-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .profile-role {
            font-size: 12px;
            color: #6c757d;
        }

        /* Card de adicionar perfil */
        .add-profile-card {
            flex: 0 0 140px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            scroll-snap-align: start;
        }

        .add-profile-avatar {
            width: 130px;
            height: 130px;
            background: #e2e8f0;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            color: #6c757d;
            font-size: 48px;
            border: 2px dashed #cbd5e1;
            transition: 0.2s;
        }

        .add-profile-card:hover .add-profile-avatar {
            background: #cbd5e1;
            color: #0000FF;
        }

        .add-profile-name {
            font-weight: 500;
            font-size: 16px;
            color: #6c757d;
        }

        /* Modal para criar/editar perfil */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-save {
            background: #0000FF;
            color: white;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #1a1a2e;
        }

        /* Tabs e conteúdo (mesmo do código anterior) */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: white;
            padding: 8px 16px;
            border-radius: 60px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #4a5568;
        }

        .tab-btn.active {
            background: #0000FF;
            color: white;
        }

        .tab-content {
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            min-height: 500px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }

        @media (max-width: 768px) {
            .profile-card, .add-profile-card { flex: 0 0 100px; }
            .profile-avatar, .add-profile-avatar { width: 90px; height: 90px; font-size: 40px; }
            .tabs { width: 100%; justify-content: center; }
            .tab-btn { padding: 8px 16px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="logo"><i class="fas fa-cube"></i> JCSystem Familiar</div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
    <div class="dashboard-container">
        <div class="profiles-section">
            <div class="profiles-title">
                <i class="fas fa-users"></i> Quem está usando?
            </div>
            <div class="profiles-carousel" id="profilesScroll"></div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="visao">Visão Geral</button>
            <button class="tab-btn" data-tab="transacoes">Transações</button>
            <button class="tab-btn" data-tab="calendario">Calendário</button>
        </div>

        <div id="tabContent" class="tab-content">
            <div class="loading">Carregando...</div>
        </div>
    </div>

    <!-- Modal para criar/editar perfil -->
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Novo Perfil</h3>
            <input type="text" id="profileName" placeholder="Nome do perfil">
            <input type="text" id="profileRole" placeholder="Papel (ex: Filho, Amigo)">
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="btn-save">Salvar</button>
                <button id="cancelModalBtn" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        // Verificação de login
        let currentUser = getCurrentUser();
        if (!currentUser) window.location.href = 'login.html';

        // Perfis iniciais (apenas Juan e Fernanda)
        let profiles = [
            { id: 'juan', name: 'Juan', role: 'Administrador', emoji: '👨', color: '#0000FF', photo: null },
            { id: 'fernanda', name: 'Fernanda', role: 'Esposa', emoji: '👩', color: '#e84393', photo: null }
        ];
        let selectedProfileId = 'juan';

        // Carregar perfis do localStorage (se houver)
        function loadProfiles() {
            const stored = localStorage.getItem(`profiles_${currentUser.id}`);
            if (stored) {
                profiles = JSON.parse(stored);
                // Garantir que Juan e Fernanda existam mesmo após alterações
                if (!profiles.find(p => p.id === 'juan')) {
                    profiles.unshift({ id: 'juan', name: 'Juan', role: 'Administrador', emoji: '👨', color: '#0000FF', photo: null });
                }
                if (!profiles.find(p => p.id === 'fernanda')) {
                    profiles.push({ id: 'fernanda', name: 'Fernanda', role: 'Esposa', emoji: '👩', color: '#e84393', photo: null });
                }
            } else {
                saveProfiles();
            }
        }

        function saveProfiles() {
            localStorage.setItem(`profiles_${currentUser.id}`, JSON.stringify(profiles));
        }

        // Renderizar perfis (incluindo botão +)
        function renderProfiles() {
            const container = document.getElementById('profilesScroll');
            let html = '';

            profiles.forEach(p => {
                const avatarStyle = p.photo ? `background-image: url('${p.photo}'); background-size: cover; background-position: center;` : `background: linear-gradient(145deg, ${p.color}, ${p.color}cc);`;
                html += `
                    <div class="profile-card ${selectedProfileId === p.id ? 'active' : ''}" data-id="${p.id}">
                        <div class="profile-avatar" style="${avatarStyle} display: flex; align-items: center; justify-content: center;">
                            ${!p.photo ? p.emoji : ''}
                            <button class="edit-photo-btn" data-id="${p.id}"><i class="fas fa-pencil-alt"></i></button>
                        </div>
                        <div class="profile-name">${p.name}</div>
                        <div class="profile-role">${p.role}</div>
                    </div>
                `;
            });

            // Botão de adicionar perfil
            html += `
                <div class="add-profile-card" id="addProfileBtn">
                    <div class="add-profile-avatar"><i class="fas fa-plus"></i></div>
                    <div class="add-profile-name">Adicionar Perfil</div>
                </div>
            `;

            container.innerHTML = html;

            // Eventos de clique nos perfis
            document.querySelectorAll('.profile-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('edit-photo-btn')) return;
                    selectedProfileId = card.dataset.id;
                    renderProfiles();
                    loadCurrentTab();
                });
            });

            // Eventos de edição de foto
            document.querySelectorAll('.edit-photo-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const profileId = btn.dataset.id;
                    const url = prompt('Digite a URL da foto (ex: https://exemplo.com/foto.jpg) ou deixe em branco para remover:');
                    const profile = profiles.find(p => p.id === profileId);
                    if (profile) {
                        profile.photo = url && url.trim() ? url.trim() : null;
                        saveProfiles();
                        renderProfiles();
                    }
                });
            });

            // Evento do botão de adicionar perfil
            const addBtn = document.getElementById('addProfileBtn');
            if (addBtn) {
                addBtn.addEventListener('click', () => openModal());
            }
        }

        // Modal para criar perfil
        const modal = document.getElementById('profileModal');
        const modalTitle = document.getElementById('modalTitle');
        const profileNameInput = document.getElementById('profileName');
        const profileRoleInput = document.getElementById('profileRole');

        function openModal(profile = null) {
            if (profile) {
                modalTitle.innerText = 'Editar Perfil';
                profileNameInput.value = profile.name;
                profileRoleInput.value = profile.role;
                currentEditingId = profile.id;
            } else {
                modalTitle.innerText = 'Novo Perfil';
                profileNameInput.value = '';
                profileRoleInput.value = '';
                currentEditingId = null;
            }
            modal.style.display = 'flex';
        }

        let currentEditingId = null;

        document.getElementById('saveProfileBtn').onclick = () => {
            const name = profileNameInput.value.trim();
            const role = profileRoleInput.value.trim();
            if (!name) {
                alert('Digite um nome para o perfil');
                return;
            }
            if (currentEditingId) {
                // Editar existente
                const profile = profiles.find(p => p.id === currentEditingId);
                if (profile) {
                    profile.name = name;
                    profile.role = role || 'Perfil';
                    saveProfiles();
                }
            } else {
                // Criar novo
                const newId = Date.now().toString();
                const colors = ['#0984e3', '#00b894', '#fdcb6e', '#e17055', '#6c5ce7'];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                profiles.push({
                    id: newId,
                    name: name,
                    role: role || 'Perfil',
                    emoji: '😊',
                    color: randomColor,
                    photo: null
                });
                saveProfiles();
            }
            modal.style.display = 'none';
            renderProfiles();
        };

        document.getElementById('cancelModalBtn').onclick = () => {
            modal.style.display = 'none';
        };

        // Fechar modal ao clicar fora
        window.onclick = (event) => {
            if (event.target === modal) modal.style.display = 'none';
        };

        // Carregar conteúdo das abas (fetch) - igual ao anterior
        async function loadTabContent(tabId) {
            const contentDiv = document.getElementById('tabContent');
            contentDiv.innerHTML = '<div class="loading">Carregando...</div>';
            let url = '';
            if (tabId === 'visao') url = 'visao-geral.html';
            else if (tabId === 'transacoes') url = 'transacoes.html';
            else if (tabId === 'calendario') url = 'calendario.html';
            try {
                const response = await fetch(`${url}?profile=${selectedProfileId}&_=${Date.now()}`);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const html = await response.text();
                contentDiv.innerHTML = html;
                const scripts = contentDiv.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                    oldScript.remove();
                });
            } catch (error) {
                contentDiv.innerHTML = '<div class="loading">Erro ao carregar. Verifique os arquivos: visao-geral.html, transacoes.html, calendario.html</div>';
            }
        }

        function loadCurrentTab() {
            const activeTab = document.querySelector('.tab-btn.active').dataset.tab;
            loadTabContent(activeTab);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadCurrentTab();
            });
        });

        document.getElementById('logoutBtn').onclick = () => { logout(); window.location.href = 'index.html'; };

        loadProfiles();
        renderProfiles();
        loadCurrentTab();
    </script>
</body>
</html>
