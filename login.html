<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | JCSystem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #F0F5FF, #E8EFFF); padding: 20px; }
        .login-card { max-width: 450px; width: 100%; background: white; border-radius: 24px; padding: 40px; box-shadow: 0 20px 35px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
        .btn-login { width: 100%; padding: 12px; background: #0000FF; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .message { margin-top: 16px; padding: 12px; border-radius: 12px; text-align: center; }
        .error { background: #FEE2E2; color: #DC2626; }
        .success { background: #D1FAE5; color: #059669; }
        .test-accounts { margin-top: 24px; padding: 16px; background: #f5f5f5; border-radius: 12px; font-size: 13px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>Bem-vindo de volta</h1>
            <form id="loginForm">
                <div class="form-group"><input type="email" id="email" placeholder="E-mail" required></div>
                <div class="form-group"><input type="password" id="password" placeholder="Senha" required></div>
                <button type="submit" class="btn-login">Entrar</button>
            </form>
            <div id="message"></div>
            <div class="test-accounts">
                <strong>🔐 Contas de teste</strong><br>
                Familiar: familia@jcsystem.com / familia123<br>
                Empresarial: empresa@jcsystem.com / familia123
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');

            // Chamar login do auth.js
            const user = login(email, password);

            if (user) {
                msgDiv.className = 'message success';
                msgDiv.textContent = 'Login realizado! Redirecionando...';
                // Verificar se o usuário foi realmente salvo
                const savedUser = localStorage.getItem('jcsystem_current_user');
                console.log('Usuário salvo após login:', savedUser);
                setTimeout(() => {
                    if (user.plan === 'familiar') window.location.href = 'dashboard-pessoal.html';
                    else if (user.plan === 'empresarial') window.location.href = 'dashboard-empresarial.html';
                    else window.location.href = 'index.html';
                }, 1000);
            } else {
                msgDiv.className = 'message error';
                msgDiv.textContent = 'E-mail ou senha inválidos';
            }
        });
    </script>
</body>
</html>
