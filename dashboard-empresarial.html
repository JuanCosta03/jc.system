<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCSystem | Área Empresarial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: var(--gray-light); font-family: 'Inter', sans-serif; margin: 0; }
        .dashboard-header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow); }
        .dashboard-container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: var(--shadow); }
        .kpi-value { font-size: 28px; font-weight: bold; color: var(--blue-primary); }
        .chart-container { background: white; border-radius: 16px; padding: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .btn-sm { background: var(--blue-primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .btn-danger { background: #DC2626; }
        .logout-btn { background: none; border: 1px solid #ccc; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #ddd; }
        .tab-btn { background: none; border: none; padding: 10px 20px; cursor: pointer; font-weight: 500; }
        .tab-btn.active { color: var(--blue-primary); border-bottom: 2px solid var(--blue-primary); }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
        .form-input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="logo"><i class="fas fa-cube"></i> JCSystem Empresarial</div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
    <div class="dashboard-container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="home">Dashboard</button>
            <button class="tab-btn" data-tab="rh">RH / Funcionários</button>
            <button class="tab-btn" data-tab="estoque">Estoque</button>
            <button class="tab-btn" data-tab="vendas">Ranking de Vendas</button>
            <button class="tab-btn" data-tab="impostos">Impostos</button>
            <button class="tab-btn" data-tab="fornecedores">Fornecedores</button>
        </div>
        <div id="home" class="tab-pane active"></div>
        <div id="rh" class="tab-pane"></div>
        <div id="estoque" class="tab-pane"></div>
        <div id="vendas" class="tab-pane"></div>
        <div id="impostos" class="tab-pane"></div>
        <div id="fornecedores" class="tab-pane"></div>
    </div>
    <script src="auth.js"></script>
    <script>
        let currentUser = getCurrentUser();
        if (!currentUser) window.location.href = 'login.html';

        // Dados de exemplo
        let employees = [
            { id: 1, name: "Carlos Silva", cpf: "123.456.789-00", rg: "12.345.678-9", salary: 4500, active: true },
            { id: 2, name: "Ana Souza", cpf: "987.654.321-00", rg: "98.765.432-1", salary: 5200, active: true },
            { id: 3, name: "Roberto Lima", cpf: "111.222.333-44", rg: "11.222.333-4", salary: 3800, active: true },
            { id: 4, name: "Fernanda Rocha", cpf: "555.666.777-88", rg: "55.666.777-8", salary: 6200, active: false } // desligado
        ];
        let firedEmployees = employees.filter(e => !e.active);
        let products = [
            { id: 1, name: "Notebook Dell", quantity: 15, price: 3500 },
            { id: 2, name: "Mouse Logitech", quantity: 50, price: 120 },
            { id: 3, name: "Teclado Mecânico", quantity: 30, price: 250 },
            { id: 4, name: "Monitor LG", quantity: 12, price: 1100 }
        ];
        let sales = [
            { id: 1, productName: "Notebook Dell", quantity: 3, total: 10500, date: "2025-03-01", seller: "Carlos" },
            { id: 2, productName: "Mouse Logitech", quantity: 10, total: 1200, date: "2025-03-02", seller: "Ana" },
            { id: 3, productName: "Teclado Mecânico", quantity: 8, total: 2000, date: "2025-03-03", seller: "Carlos" },
            { id: 4, productName: "Monitor LG", quantity: 2, total: 2200, date: "2025-03-04", seller: "Roberto" },
            { id: 5, productName: "Notebook Dell", quantity: 1, total: 3500, date: "2025-03-05", seller: "Ana" }
        ];
        let suppliers = [
            { id: 1, name: "Fornecedor Tech LTDA", cnpj: "12.345.678/0001-00", phone: "(11) 9999-8888" },
            { id: 2, name: "Distribuidora Logitech", cnpj: "98.765.432/0001-11", phone: "(11) 7777-6666" }
        ];
        let taxConfig = { simplesNacional: 6, fgts: 8, inss: 11, rent: 3500 };

        function saveCompanyData() {
            const data = { employees, firedEmployees, products, sales, suppliers, taxConfig };
            localStorage.setItem(`company_${currentUser.id}`, JSON.stringify(data));
        }

        function loadCompanyData() {
            const stored = localStorage.getItem(`company_${currentUser.id}`);
            if (stored) {
                const data = JSON.parse(stored);
                employees = data.employees; firedEmployees = data.firedEmployees;
                products = data.products; sales = data.sales;
                suppliers = data.suppliers; taxConfig = data.taxConfig;
            } else {
                saveCompanyData(); // salva exemplos
            }
        }

        // Renderização das abas
        function renderHome() {
            const totalSales = sales.reduce((s, sale) => s + sale.total, 0);
            const totalProducts = products.reduce((s, p) => s + p.quantity, 0);
            const activeEmployees = employees.filter(e => e.active).length;
            const payroll = employees.filter(e => e.active).reduce((s, e) => s + e.salary, 0);
            const taxes = totalSales * taxConfig.simplesNacional / 100 + payroll * (taxConfig.fgts + taxConfig.inss) / 100;
            const profit = totalSales - taxes - taxConfig.rent;
            const container = document.getElementById('home');
            container.innerHTML = `
                <div class="cards-grid">
                    <div class="card"><h3>Faturamento Mensal</h3><div class="kpi-value">R$ ${totalSales.toFixed(2)}</div></div>
                    <div class="card"><h3>Estoque Total</h3><div class="kpi-value">${totalProducts} unid.</div></div>
                    <div class="card"><h3>Funcionários Ativos</h3><div class="kpi-value">${activeEmployees}</div></div>
                    <div class="card"><h3>Lucro Estimado</h3><div class="kpi-value" style="color:green;">R$ ${profit.toFixed(2)}</div></div>
                </div>
                <div class="chart-container"><h3>Entradas vs Saídas (Mês)</h3><canvas id="cashFlowChart" height="100"></canvas></div>
                <div class="chart-container"><h3>Projeção de Lucro (6 meses)</h3><canvas id="profitChart" height="100"></canvas></div>
            `;
            const ctx1 = document.getElementById('cashFlowChart')?.getContext('2d');
            if (ctx1) new Chart(ctx1, { type: 'bar', data: { labels: ['Jan','Fev','Mar','Abr','Mai','Jun'], datasets: [{ label: 'Entradas', data: [12000,15000,13500,16000,18000,17500], backgroundColor: '#4CAF50' }, { label: 'Saídas', data: [8000,9000,8500,10000,11000,10500], backgroundColor: '#F44336' }] } });
            const ctx2 = document.getElementById('profitChart')?.getContext('2d');
            if (ctx2) new Chart(ctx2, { type: 'line', data: { labels: ['Mês 1','Mês 2','Mês 3','Mês 4','Mês 5','Mês 6'], datasets: [{ label: 'Lucro Projetado', data: [5200,6000,7200,8500,9100,10200], borderColor: '#0000FF', fill: false }] } });
        }

        function renderRH() {
            const active = employees.filter(e => e.active);
            const container = document.getElementById('rh');
            container.innerHTML = `
                <div class="card"><h3>Cadastrar Funcionário</h3><button id="showEmployeeForm" class="btn-sm">+ Novo</button>
                <div id="employeeForm" style="display:none;" class="form-grid">
                    <input type="text" id="empName" placeholder="Nome" class="form-input"><input type="text" id="empCpf" placeholder="CPF"><input type="text" id="empRg" placeholder="RG"><input type="number" id="empSalary" placeholder="Salário"><button id="saveEmpBtn" class="btn-sm">Salvar</button>
                </div></div>
                <div class="card"><h3>Funcionários Ativos</h3><table><thead><tr><th>Nome</th><th>CPF</th><th>Salário</th><th>Ações</th></tr></thead><tbody>
                    ${active.map(e => `<tr><td>${e.name}</td><td>${e.cpf}</td><td>R$ ${e.salary}</td><td><button class="btn-danger fire-btn" data-id="${e.id}">Demitir</button></td></tr>`).join('')}
                </tbody></table></div>
                <div class="card"><h3>Funcionários Desligados</h3><table><thead><tr><th>Nome</th><th>CPF</th></tr></thead><tbody>
                    ${firedEmployees.map(e => `<tr><td>${e.name}</td><td>${e.cpf}</td></tr>`).join('')}
                </tbody></table></div>
            `;
            document.getElementById('showEmployeeForm')?.addEventListener('click', () => document.getElementById('employeeForm').style.display = 'block');
            document.getElementById('saveEmpBtn')?.addEventListener('click', () => {
                const name = document.getElementById('empName').value, cpf = document.getElementById('empCpf').value, rg = document.getElementById('empRg').value, salary = parseFloat(document.getElementById('empSalary').value);
                if (!name || !cpf || !rg || isNaN(salary)) return alert('Preencha todos os campos');
                employees.push({ id: Date.now(), name, cpf, rg, salary, active: true });
                saveCompanyData(); renderRH();
            });
            document.querySelectorAll('.fire-btn').forEach(btn => btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                const emp = employees.find(e => e.id === id);
                if (emp && confirm(`Demitir ${emp.name}?`)) {
                    emp.active = false;
                    firedEmployees.push(emp);
                    employees = employees.filter(e => e.id !== id);
                    saveCompanyData(); renderRH();
                }
            }));
        }

        function renderEstoque() {
            const container = document.getElementById('estoque');
            container.innerHTML = `
                <div class="card"><h3>Adicionar Produto</h3><button id="showProductForm" class="btn-sm">+ Produto</button>
                <div id="productForm" style="display:none;" class="form-grid">
                    <input type="text" id="prodName" placeholder="Nome"><input type="number" id="prodQty" placeholder="Quantidade"><input type="number" id="prodPrice" placeholder="Preço"><button id="saveProdBtn" class="btn-sm">Salvar</button>
                </div></div>
                <div class="card"><h3>Produtos em Estoque</h3><table><thead><tr><th>Produto</th><th>Quantidade</th><th>Preço</th><th>Ações</th></tr></thead><tbody>
                    ${products.map(p => `<tr><td>${p.name}</td><td>${p.quantity}</td><td>R$ ${p.price}</td><td><button class="btn-danger del-prod" data-id="${p.id}">Excluir</button></td></tr>`).join('')}
                </tbody></table></div>
            `;
            document.getElementById('showProductForm')?.addEventListener('click', () => document.getElementById('productForm').style.display = 'block');
            document.getElementById('saveProdBtn')?.addEventListener('click', () => {
                const name = document.getElementById('prodName').value, qty = parseInt(document.getElementById('prodQty').value), price = parseFloat(document.getElementById('prodPrice').value);
                if (!name || isNaN(qty) || isNaN(price)) return alert('Preencha corretamente');
                products.push({ id: Date.now(), name, quantity: qty, price });
                saveCompanyData(); renderEstoque();
            });
            document.querySelectorAll('.del-prod').forEach(btn => btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                products = products.filter(p => p.id !== id);
                saveCompanyData(); renderEstoque();
            }));
        }

        function renderVendas() {
            const ranking = sales.reduce((acc, sale) => { acc[sale.seller] = (acc[sale.seller] || 0) + sale.total; return acc; }, {});
            const sorted = Object.entries(ranking).sort((a,b) => b[1] - a[1]);
            const container = document.getElementById('vendas');
            container.innerHTML = `
                <div class="card"><h3>Ranking de Vendedores</h3><table><thead><tr><th>Vendedor</th><th>Total (R$)</th></tr></thead><tbody>
                    ${sorted.map(([name, total]) => `<tr><td>${name}</td><td>R$ ${total.toFixed(2)}</td></tr>`).join('')}
                </tbody></table></div>
                <div class="card"><h3>Últimas Vendas</h3><table><thead><tr><th>Data</th><th>Produto</th><th>Qtd</th><th>Total</th><th>Vendedor</th></tr></thead><tbody>
                    ${sales.slice(-10).reverse().map(s => `<tr><td>${s.date}</td><td>${s.productName}</td><td>${s.quantity}</td><td>R$ ${s.total}</td><td>${s.seller}</td></tr>`).join('')}
                </tbody></table></div>
            `;
        }

        function renderImpostos() {
            const totalSales = sales.reduce((s, sale) => s + sale.total, 0);
            const payroll = employees.filter(e => e.active).reduce((s, e) => s + e.salary, 0);
            const sn = totalSales * taxConfig.simplesNacional / 100;
            const fgts = payroll * taxConfig.fgts / 100;
            const inss = payroll * taxConfig.inss / 100;
            const container = document.getElementById('impostos');
            container.innerHTML = `
                <div class="card"><h3>Configuração de Impostos</h3>
                    <div class="form-grid">
                        <label>Simples Nacional (%): <input type="number" id="taxSN" value="${taxConfig.simplesNacional}" class="form-input"></label>
                        <label>FGTS (%): <input type="number" id="taxFGTS" value="${taxConfig.fgts}" class="form-input"></label>
                        <label>INSS (%): <input type="number" id="taxINSS" value="${taxConfig.inss}" class="form-input"></label>
                        <label>Aluguel (R$): <input type="number" id="taxRent" value="${taxConfig.rent}" class="form-input"></label>
                        <button id="saveTaxBtn" class="btn-sm">Salvar</button>
                    </div>
                </div>
                <div class="card"><h3>Resumo Mensal</h3>
                    <p>Simples Nacional: R$ ${sn.toFixed(2)}</p><p>FGTS: R$ ${fgts.toFixed(2)}</p><p>INSS: R$ ${inss.toFixed(2)}</p><p>Aluguel: R$ ${taxConfig.rent.toFixed(2)}</p>
                    <p><strong>Total Impostos + Custos: R$ ${(sn+fgts+inss+taxConfig.rent).toFixed(2)}</strong></p>
                </div>
            `;
            document.getElementById('saveTaxBtn')?.addEventListener('click', () => {
                taxConfig.simplesNacional = parseFloat(document.getElementById('taxSN').value);
                taxConfig.fgts = parseFloat(document.getElementById('taxFGTS').value);
                taxConfig.inss = parseFloat(document.getElementById('taxINSS').value);
                taxConfig.rent = parseFloat(document.getElementById('taxRent').value);
                saveCompanyData(); renderImpostos();
            });
        }

        function renderFornecedores() {
            const container = document.getElementById('fornecedores');
            container.innerHTML = `
                <div class="card"><h3>Cadastrar Fornecedor</h3><button id="showSupplierForm" class="btn-sm">+ Novo</button>
                <div id="supplierForm" style="display:none;" class="form-grid">
                    <input type="text" id="supName" placeholder="Nome"><input type="text" id="supCnpj" placeholder="CNPJ"><input type="text" id="supPhone" placeholder="Telefone"><button id="saveSupBtn" class="btn-sm">Salvar</button>
                </div></div>
                <div class="card"><h3>Lista de Fornecedores</h3><table><thead><tr><th>Nome</th><th>CNPJ</th><th>Telefone</th><th>Ações</th></tr></thead><tbody>
                    ${suppliers.map(s => `<tr><td>${s.name}</td><td>${s.cnpj}</td><td>${s.phone}</td><td><button class="btn-danger del-sup" data-id="${s.id}">Excluir</button></td></tr>`).join('')}
                </tbody></table></div>
            `;
            document.getElementById('showSupplierForm')?.addEventListener('click', () => document.getElementById('supplierForm').style.display = 'block');
            document.getElementById('saveSupBtn')?.addEventListener('click', () => {
                const name = document.getElementById('supName').value, cnpj = document.getElementById('supCnpj').value, phone = document.getElementById('supPhone').value;
                if (!name) return alert('Nome é obrigatório');
                suppliers.push({ id: Date.now(), name, cnpj, phone });
                saveCompanyData(); renderFornecedores();
            });
            document.querySelectorAll('.del-sup').forEach(btn => btn.addEventListener('click', () => {
                const id = parseInt(btn.dataset.id);
                suppliers = suppliers.filter(s => s.id !== id);
                saveCompanyData(); renderFornecedores();
            }));
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'home') renderHome();
            else if (tabId === 'rh') renderRH();
            else if (tabId === 'estoque') renderEstoque();
            else if (tabId === 'vendas') renderVendas();
            else if (tabId === 'impostos') renderImpostos();
            else if (tabId === 'fornecedores') renderFornecedores();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        loadCompanyData();
        switchTab('home');
        document.getElementById('logoutBtn').onclick = () => { logout(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
