<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas Vip | JCSystem</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f0f2f5;
            font-family: 'Inter', sans-serif;
        }
        .header {
            background: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #0000FF;
        }
        .nav-buttons {
            display: flex;
            gap: 16px;
        }
        .nav-buttons a, .nav-buttons button {
            text-decoration: none;
            background: none;
            border: none;
            font-weight: 500;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .btn-primary {
            background: #0000FF;
            color: white;
        }
        .container {
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 24px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }
        .kpi {
            font-size: 32px;
            font-weight: 800;
            color: #0000FF;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: white;
            padding: 8px 16px;
            border-radius: 60px;
            width: fit-content;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #0000FF;
            color: white;
        }
        .tab-pane {
            display: none;
            background: white;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }
        .tab-pane.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .btn-sm {
            background: #0000FF;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
        }
        .btn-danger {
            background: #c62828;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 16px;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pendente { background: #f39c12; color: white; }
        .status-em-andamento { background: #0000FF; color: white; }
        .status-entregue { background: #2e7d32; color: white; }
        .status-cancelado { background: #c62828; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-truck"></i> Entregas Vip</div>
        <div class="nav-buttons">
            <a href="dashboard-pessoal.html" class="btn-primary">Voltar ao Financeiro</a>
            <button id="logoutBtn">Sair</button>
        </div>
    </div>
    <div class="container">
        <div class="cards" id="kpiCards"></div>
        <div class="tabs">
            <button class="tab-btn active" data-tab="entregadores">Entregadores</button>
            <button class="tab-btn" data-tab="entregas">Entregas</button>
        </div>
        <div id="entregadores" class="tab-pane active"></div>
        <div id="entregas" class="tab-pane"></div>
    </div>

    <!-- Modal Entregador -->
    <div id="entregadorModal" class="modal">
        <div class="modal-content">
            <h3 id="modalEntregadorTitle">Novo Entregador</h3>
            <input type="text" id="entregadorNome" placeholder="Nome completo">
            <input type="text" id="entregadorTelefone" placeholder="Telefone">
            <input type="text" id="entregadorVeiculo" placeholder="Veículo (ex: Moto, Carro)">
            <div class="form-actions">
                <button id="cancelEntregadorBtn" style="background:#e2e8f0; border:none; padding:8px 16px; border-radius:40px;">Cancelar</button>
                <button id="saveEntregadorBtn" style="background:#0000FF; color:white; border:none; padding:8px 16px; border-radius:40px;">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal Entrega -->
    <div id="entregaModal" class="modal">
        <div class="modal-content">
            <h3 id="modalEntregaTitle">Nova Entrega</h3>
            <input type="text" id="entregaCliente" placeholder="Nome do cliente">
            <input type="text" id="entregaEndereco" placeholder="Endereço de entrega">
            <select id="entregaEntregadorId"></select>
            <select id="entregaStatus">
                <option value="pendente">Pendente</option>
                <option value="em_andamento">Em andamento</option>
                <option value="entregue">Entregue</option>
                <option value="cancelado">Cancelado</option>
            </select>
            <input type="date" id="entregaData">
            <div class="form-actions">
                <button id="cancelEntregaBtn" style="background:#e2e8f0; border:none; padding:8px 16px; border-radius:40px;">Cancelar</button>
                <button id="saveEntregaBtn" style="background:#0000FF; color:white; border:none; padding:8px 16px; border-radius:40px;">Salvar</button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        let currentUser = getCurrentUser();
        if (!currentUser) window.location.href = 'login.html';

        // Dados
        let entregadores = [];
        let entregas = [];
        let editingEntregadorId = null;
        let editingEntregaId = null;

        function loadData() {
            const storedEntregadores = localStorage.getItem(`entregadores_${currentUser.id}`);
            if (storedEntregadores) entregadores = JSON.parse(storedEntregadores);
            else entregadores = [];

            const storedEntregas = localStorage.getItem(`entregas_${currentUser.id}`);
            if (storedEntregas) entregas = JSON.parse(storedEntregas);
            else entregas = [];
        }

        function saveEntregadores() {
            localStorage.setItem(`entregadores_${currentUser.id}`, JSON.stringify(entregadores));
        }

        function saveEntregas() {
            localStorage.setItem(`entregas_${currentUser.id}`, JSON.stringify(entregas));
        }

        function updateKPIs() {
            const totalEntregadores = entregadores.length;
            const totalEntregas = entregas.length;
            const entregues = entregas.filter(e => e.status === 'entregue').length;
            const pendentes = entregas.filter(e => e.status === 'pendente').length;
            document.getElementById('kpiCards').innerHTML = `
                <div class="card"><h3>📦 Entregadores</h3><div class="kpi">${totalEntregadores}</div></div>
                <div class="card"><h3>📋 Total de Entregas</h3><div class="kpi">${totalEntregas}</div></div>
                <div class="card"><h3>✅ Entregues</h3><div class="kpi">${entregues}</div></div>
                <div class="card"><h3>⏳ Pendentes</h3><div class="kpi">${pendentes}</div></div>
            `;
        }

        function renderEntregadores() {
            const container = document.getElementById('entregadores');
            if (!container) return;
            let html = `
                <div style="margin-bottom:20px; text-align:right;">
                    <button id="addEntregadorBtn" class="btn-sm"><i class="fas fa-plus"></i> Novo Entregador</button>
                </div>
                <table>
                    <thead><tr><th>Nome</th><th>Telefone</th><th>Veículo</th><th>Ações</th></tr></thead>
                    <tbody>
            `;
            entregadores.forEach(e => {
                html += `
                    <tr>
                        <td>${e.nome}</td>
                        <td>${e.telefone || '-'}</td>
                        <td>${e.veiculo || '-'}</td>
                        <td>
                            <button class="btn-sm edit-entregador" data-id="${e.id}">✏️ Editar</button>
                            <button class="btn-sm btn-danger delete-entregador" data-id="${e.id}">🗑️ Excluir</button>
                        </td>
                    </tr>
                `;
            });
            if (entregadores.length === 0) html += '<tr><td colspan="4">Nenhum entregador cadastrado</td></tr>';
            html += '</tbody></table>';
            container.innerHTML = html;

            document.getElementById('addEntregadorBtn')?.addEventListener('click', () => openEntregadorModal());
            document.querySelectorAll('.edit-entregador').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    const entregador = entregadores.find(e => e.id === id);
                    if (entregador) openEntregadorModal(entregador);
                });
            });
            document.querySelectorAll('.delete-entregador').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    if (confirm('Tem certeza que deseja excluir este entregador?')) {
                        entregadores = entregadores.filter(e => e.id !== id);
                        // Remover entregas associadas? Opcional
                        saveEntregadores();
                        renderEntregadores();
                        updateKPIs();
                        renderEntregas(); // atualiza o select nas entregas
                    }
                });
            });
        }

        function renderEntregas() {
            const container = document.getElementById('entregas');
            if (!container) return;
            let html = `
                <div style="margin-bottom:20px; text-align:right;">
                    <button id="addEntregaBtn" class="btn-sm"><i class="fas fa-plus"></i> Nova Entrega</button>
                </div>
                <table>
                    <thead><tr><th>Cliente</th><th>Endereço</th><th>Entregador</th><th>Status</th><th>Data</th><th>Ações</th></tr></thead>
                    <tbody>
            `;
            entregas.forEach(e => {
                const entregadorNome = entregadores.find(ent => ent.id === e.entregadorId)?.nome || 'Não atribuído';
                let statusClass = '';
                if (e.status === 'pendente') statusClass = 'status-pendente';
                else if (e.status === 'em_andamento') statusClass = 'status-em-andamento';
                else if (e.status === 'entregue') statusClass = 'status-entregue';
                else if (e.status === 'cancelado') statusClass = 'status-cancelado';
                html += `
                    <tr>
                        <td>${e.cliente}</td>
                        <td>${e.endereco}</td>
                        <td>${entregadorNome}</td>
                        <td><span class="status-badge ${statusClass}">${e.status.replace('_', ' ')}</span></td>
                        <td>${e.data || '-'}</td>
                        <td>
                            <button class="btn-sm edit-entrega" data-id="${e.id}">✏️ Editar</button>
                            <button class="btn-sm btn-danger delete-entrega" data-id="${e.id}">🗑️ Excluir</button>
                        </td>
                    </tr>
                `;
            });
            if (entregas.length === 0) html += '<tr><td colspan="6">Nenhuma entrega cadastrada</td></tr>';
            html += '</tbody></table>';
            container.innerHTML = html;

            document.getElementById('addEntregaBtn')?.addEventListener('click', () => openEntregaModal());
            document.querySelectorAll('.edit-entrega').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    const entrega = entregas.find(e => e.id === id);
                    if (entrega) openEntregaModal(entrega);
                });
            });
            document.querySelectorAll('.delete-entrega').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    if (confirm('Tem certeza que deseja excluir esta entrega?')) {
                        entregas = entregas.filter(e => e.id !== id);
                        saveEntregas();
                        renderEntregas();
                        updateKPIs();
                    }
                });
            });
        }

        function openEntregadorModal(entregador = null) {
            const modal = document.getElementById('entregadorModal');
            const title = document.getElementById('modalEntregadorTitle');
            const nomeInput = document.getElementById('entregadorNome');
            const telefoneInput = document.getElementById('entregadorTelefone');
            const veiculoInput = document.getElementById('entregadorVeiculo');
            if (entregador) {
                title.innerText = 'Editar Entregador';
                nomeInput.value = entregador.nome;
                telefoneInput.value = entregador.telefone || '';
                veiculoInput.value = entregador.veiculo || '';
                editingEntregadorId = entregador.id;
            } else {
                title.innerText = 'Novo Entregador';
                nomeInput.value = '';
                telefoneInput.value = '';
                veiculoInput.value = '';
                editingEntregadorId = null;
            }
            modal.style.display = 'flex';
        }

        function openEntregaModal(entrega = null) {
            const modal = document.getElementById('entregaModal');
            const title = document.getElementById('modalEntregaTitle');
            const clienteInput = document.getElementById('entregaCliente');
            const enderecoInput = document.getElementById('entregaEndereco');
            const entregadorSelect = document.getElementById('entregaEntregadorId');
            const statusSelect = document.getElementById('entregaStatus');
            const dataInput = document.getElementById('entregaData');

            // Preencher select de entregadores
            entregadorSelect.innerHTML = '<option value="">Selecione um entregador</option>';
            entregadores.forEach(ent => {
                entregadorSelect.innerHTML += `<option value="${ent.id}">${ent.nome}</option>`;
            });

            if (entrega) {
                title.innerText = 'Editar Entrega';
                clienteInput.value = entrega.cliente;
                enderecoInput.value = entrega.endereco;
                entregadorSelect.value = entrega.entregadorId || '';
                statusSelect.value = entrega.status;
                dataInput.value = entrega.data || '';
                editingEntregaId = entrega.id;
            } else {
                title.innerText = 'Nova Entrega';
                clienteInput.value = '';
                enderecoInput.value = '';
                entregadorSelect.value = '';
                statusSelect.value = 'pendente';
                dataInput.value = '';
                editingEntregaId = null;
            }
            modal.style.display = 'flex';
        }

        document.getElementById('saveEntregadorBtn').onclick = () => {
            const nome = document.getElementById('entregadorNome').value.trim();
            const telefone = document.getElementById('entregadorTelefone').value.trim();
            const veiculo = document.getElementById('entregadorVeiculo').value.trim();
            if (!nome) {
                alert('Nome é obrigatório');
                return;
            }
            if (editingEntregadorId) {
                const index = entregadores.findIndex(e => e.id === editingEntregadorId);
                if (index !== -1) {
                    entregadores[index].nome = nome;
                    entregadores[index].telefone = telefone;
                    entregadores[index].veiculo = veiculo;
                }
            } else {
                entregadores.push({
                    id: Date.now(),
                    nome,
                    telefone,
                    veiculo
                });
            }
            saveEntregadores();
            document.getElementById('entregadorModal').style.display = 'none';
            renderEntregadores();
            renderEntregas(); // atualiza o select nas entregas
            updateKPIs();
        };

        document.getElementById('saveEntregaBtn').onclick = () => {
            const cliente = document.getElementById('entregaCliente').value.trim();
            const endereco = document.getElementById('entregaEndereco').value.trim();
            const entregadorId = parseInt(document.getElementById('entregaEntregadorId').value);
            const status = document.getElementById('entregaStatus').value;
            const data = document.getElementById('entregaData').value;
            if (!cliente || !endereco) {
                alert('Cliente e endereço são obrigatórios');
                return;
            }
            if (editingEntregaId) {
                const index = entregas.findIndex(e => e.id === editingEntregaId);
                if (index !== -1) {
                    entregas[index].cliente = cliente;
                    entregas[index].endereco = endereco;
                    entregas[index].entregadorId = entregadorId || null;
                    entregas[index].status = status;
                    entregas[index].data = data;
                }
            } else {
                entregas.push({
                    id: Date.now(),
                    cliente,
                    endereco,
                    entregadorId: entregadorId || null,
                    status,
                    data
                });
            }
            saveEntregas();
            document.getElementById('entregaModal').style.display = 'none';
            renderEntregas();
            updateKPIs();
        };

        document.getElementById('cancelEntregadorBtn').onclick = () => {
            document.getElementById('entregadorModal').style.display = 'none';
        };
        document.getElementById('cancelEntregaBtn').onclick = () => {
            document.getElementById('entregaModal').style.display = 'none';
        };
        document.getElementById('logoutBtn').onclick = () => {
            logout();
            window.location.href = 'index.html';
        };

        // Abas
        function switchTab(tabId) {
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'entregadores') renderEntregadores();
            else if (tabId === 'entregas') renderEntregas();
        }
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        loadData();
        updateKPIs();
        renderEntregadores();
        renderEntregas();
    </script>
</body>
</html>
