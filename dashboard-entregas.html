<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entregas VIP | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; margin: 0; }
        .dashboard-header { background: white; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 24px; font-weight: 700; color: #0000FF; }
        .logout-btn { background: none; border: 1px solid #ddd; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .dashboard-container { max-width: 1400px; margin: 30px auto; padding: 0 24px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; background: white; padding: 8px 16px; border-radius: 60px; width: fit-content; }
        .tab-btn { background: none; border: none; padding: 10px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: #0000FF; color: white; }
        .tab-content { background: white; border-radius: 28px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); min-height: 500px; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 24px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; margin-bottom: 30px; }
        .kpi-value { font-size: 28px; font-weight: 800; color: #0000FF; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .btn-sm { background: #0000FF; color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; }
        .btn-danger { background: #c62828; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; border-radius:32px; padding:24px; max-width:500px; width:90%; }
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .form-input { padding:10px; border:1px solid #ddd; border-radius:16px; }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="logo"><i class="fas fa-truck"></i> Entregas VIP</div>
        <button id="logoutBtn" class="logout-btn">Sair</button>
    </div>
    <div class="dashboard-container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="entregadores">Entregadores</button>
            <button class="tab-btn" data-tab="pedidos">Pedidos</button>
            <button class="tab-btn" data-tab="relatorios">Relatórios</button>
        </div>
        <div id="tabContent" class="tab-content">Carregando...</div>
    </div>

    <!-- Modal para adicionar entregador -->
    <div id="entregadorModal" class="modal">
        <div class="modal-content">
            <h3>➕ Adicionar Entregador</h3>
            <div class="form-grid">
                <input type="text" id="entNome" placeholder="Nome" class="form-input">
                <input type="text" id="entTelefone" placeholder="Telefone" class="form-input">
                <input type="text" id="entVeiculo" placeholder="Veículo" class="form-input">
                <input type="text" id="entPlaca" placeholder="Placa" class="form-input">
                <input type="number" id="entComissao" placeholder="Comissão por entrega (R$)" class="form-input" step="0.01">
            </div>
            <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                <button id="cancelEntBtn" class="btn-sm" style="background:#ccc;">Cancelar</button>
                <button id="saveEntBtn" class="btn-sm">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Modal para adicionar pedido -->
    <div id="pedidoModal" class="modal">
        <div class="modal-content">
            <h3>➕ Novo Pedido</h3>
            <div class="form-grid">
                <input type="text" id="pedCliente" placeholder="Cliente" class="form-input">
                <input type="text" id="pedEndereco" placeholder="Endereço" class="form-input">
                <input type="number" id="pedValor" placeholder="Valor (R$)" class="form-input" step="0.01">
                <select id="pedEntregador" class="form-input"></select>
                <select id="pedStatus" class="form-input">
                    <option value="pendente">Pendente</option>
                    <option value="entregue">Entregue</option>
                    <option value="cancelado">Cancelado</option>
                </select>
            </div>
            <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
                <button id="cancelPedBtn" class="btn-sm" style="background:#ccc;">Cancelar</button>
                <button id="savePedBtn" class="btn-sm">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // Verificar se está logado
        const currentUser = localStorage.getItem('entregas_current_user');
        if (!currentUser) {
            window.location.href = 'login-entrega.html';
        }

        let entregadores = [];
        let pedidos = [];

        function loadData() {
            const storedEnt = localStorage.getItem('entregas_entregadores');
            const storedPed = localStorage.getItem('entregas_pedidos');
            entregadores = storedEnt ? JSON.parse(storedEnt) : [
                { id: 1, nome: "Carlos Silva", telefone: "(11) 99999-1111", veiculo: "Moto", placa: "ABC-1234", comissao: 5.00, ativo: true },
                { id: 2, nome: "Ana Souza", telefone: "(11) 99999-2222", veiculo: "Bicicleta", placa: "", comissao: 4.00, ativo: true }
            ];
            pedidos = storedPed ? JSON.parse(storedPed) : [
                { id: 1, cliente: "João Santos", endereco: "Rua A, 123", valor: 25.00, entregadorId: 1, status: "entregue", data: "2025-03-10" },
                { id: 2, cliente: "Maria Oliveira", endereco: "Rua B, 456", valor: 30.00, entregadorId: 2, status: "pendente", data: "2025-03-12" }
            ];
            saveData();
        }

        function saveData() {
            localStorage.setItem('entregas_entregadores', JSON.stringify(entregadores));
            localStorage.setItem('entregas_pedidos', JSON.stringify(pedidos));
        }

        function renderEntregadores() {
            let html = `
                <div class="card" style="text-align:right;">
                    <button id="addEntregadorBtn" class="btn-sm"><i class="fas fa-plus"></i> Novo Entregador</button>
                </div>
                <div class="card">
                    <h3>📋 Lista de Entregadores</h3>
                    <table>
                        <thead><tr><th>Nome</th><th>Telefone</th><th>Veículo</th><th>Placa</th><th>Comissão</th><th>Entregas</th><th>Ações</th></tr></thead>
                        <tbody>
                            ${entregadores.map(e => `
                                <tr>
                                    <td>${e.nome}</td><td>${e.telefone}</td><td>${e.veiculo}</td><td>${e.placa || '-'}</td>
                                    <td>R$ ${e.comissao.toFixed(2)}</td>
                                    <td>${pedidos.filter(p => p.entregadorId === e.id && p.status === 'entregue').length}</td>
                                    <td><button class="btn-sm btn-danger delete-ent" data-id="${e.id}">Excluir</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('tabContent').innerHTML = html;
            document.getElementById('addEntregadorBtn')?.addEventListener('click', () => openEntregadorModal());
            document.querySelectorAll('.delete-ent').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    entregadores = entregadores.filter(e => e.id !== id);
                    saveData();
                    renderEntregadores();
                });
            });
        }

        function renderPedidos() {
            let html = `
                <div class="card" style="text-align:right;">
                    <button id="addPedidoBtn" class="btn-sm"><i class="fas fa-plus"></i> Novo Pedido</button>
                </div>
                <div class="card">
                    <h3>📦 Lista de Pedidos</h3>
                    <table>
                        <thead><tr><th>Cliente</th><th>Endereço</th><th>Valor</th><th>Entregador</th><th>Status</th><th>Data</th><th>Ações</th></tr></thead>
                        <tbody>
                            ${pedidos.map(p => {
                                const entregador = entregadores.find(e => e.id === p.entregadorId);
                                return `<tr>
                                    <td>${p.cliente}</td><td>${p.endereco}</td><td>R$ ${p.valor.toFixed(2)}</td>
                                    <td>${entregador ? entregador.nome : 'Não atribuído'}</td>
                                    <td>${p.status}</td><td>${p.data || '-'}</td>
                                    <td><button class="btn-sm btn-danger delete-ped" data-id="${p.id}">Excluir</button></td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('tabContent').innerHTML = html;
            document.getElementById('addPedidoBtn')?.addEventListener('click', () => openPedidoModal());
            document.querySelectorAll('.delete-ped').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.dataset.id);
                    pedidos = pedidos.filter(p => p.id !== id);
                    saveData();
                    renderPedidos();
                });
            });
        }

        function renderRelatorios() {
            const totalEntregas = pedidos.filter(p => p.status === 'entregue').length;
            const valorTotal = pedidos.filter(p => p.status === 'entregue').reduce((s, p) => s + p.valor, 0);
            const comissoesPagas = pedidos.filter(p => p.status === 'entregue').reduce((s, p) => {
                const ent = entregadores.find(e => e.id === p.entregadorId);
                return s + (ent ? ent.comissao : 0);
            }, 0);
            const entregasPorEntregador = {};
            pedidos.filter(p => p.status === 'entregue').forEach(p => {
                const ent = entregadores.find(e => e.id === p.entregadorId);
                if (ent) entregasPorEntregador[ent.nome] = (entregasPorEntregador[ent.nome] || 0) + 1;
            });
            let html = `
                <div class="kpi-grid">
                    <div class="card"><h3>📦 Total de Entregas</h3><div class="kpi-value">${totalEntregas}</div></div>
                    <div class="card"><h3>💰 Faturamento</h3><div class="kpi-value">R$ ${valorTotal.toFixed(2)}</div></div>
                    <div class="card"><h3>💵 Comissões Pagas</h3><div class="kpi-value">R$ ${comissoesPagas.toFixed(2)}</div></div>
                </div>
                <div class="card">
                    <h3>🏆 Entregas por Entregador</h3>
                    <ul>${Object.entries(entregasPorEntregador).map(([nome, qtd]) => `<li>${nome}: ${qtd} entregas</li>`).join('')}</ul>
                </div>
            `;
            document.getElementById('tabContent').innerHTML = html;
        }

        function openEntregadorModal() {
            const modal = document.getElementById('entregadorModal');
            modal.style.display = 'flex';
            document.getElementById('saveEntBtn').onclick = () => {
                const nome = document.getElementById('entNome').value.trim();
                const telefone = document.getElementById('entTelefone').value.trim();
                const veiculo = document.getElementById('entVeiculo').value.trim();
                const placa = document.getElementById('entPlaca').value.trim();
                const comissao = parseFloat(document.getElementById('entComissao').value);
                if (!nome || !telefone || !veiculo || isNaN(comissao)) return alert('Preencha todos os campos');
                const newId = entregadores.length ? Math.max(...entregadores.map(e => e.id)) + 1 : 1;
                entregadores.push({ id: newId, nome, telefone, veiculo, placa, comissao, ativo: true });
                saveData();
                modal.style.display = 'none';
                renderEntregadores();
                document.getElementById('entNome').value = '';
                document.getElementById('entTelefone').value = '';
                document.getElementById('entVeiculo').value = '';
                document.getElementById('entPlaca').value = '';
                document.getElementById('entComissao').value = '';
            };
            document.getElementById('cancelEntBtn').onclick = () => modal.style.display = 'none';
        }

        function openPedidoModal() {
            const modal = document.getElementById('pedidoModal');
            const selectEnt = document.getElementById('pedEntregador');
            selectEnt.innerHTML = entregadores.map(e => `<option value="${e.id}">${e.nome}</option>`).join('');
            modal.style.display = 'flex';
            document.getElementById('savePedBtn').onclick = () => {
                const cliente = document.getElementById('pedCliente').value.trim();
                const endereco = document.getElementById('pedEndereco').value.trim();
                const valor = parseFloat(document.getElementById('pedValor').value);
                const entregadorId = parseInt(document.getElementById('pedEntregador').value);
                const status = document.getElementById('pedStatus').value;
                if (!cliente || !endereco || isNaN(valor)) return alert('Preencha cliente, endereço e valor');
                const newId = pedidos.length ? Math.max(...pedidos.map(p => p.id)) + 1 : 1;
                pedidos.push({ id: newId, cliente, endereco, valor, entregadorId, status, data: new Date().toISOString().slice(0,10) });
                saveData();
                modal.style.display = 'none';
                renderPedidos();
                document.getElementById('pedCliente').value = '';
                document.getElementById('pedEndereco').value = '';
                document.getElementById('pedValor').value = '';
            };
            document.getElementById('cancelPedBtn').onclick = () => modal.style.display = 'none';
        }

        function switchTab(tabId) {
            if (tabId === 'entregadores') renderEntregadores();
            else if (tabId === 'pedidos') renderPedidos();
            else if (tabId === 'relatorios') renderRelatorios();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchTab(btn.dataset.tab);
            });
        });

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.removeItem('entregas_current_user');
            window.location.href = 'login-entrega.html';
        };

        loadData();
        switchTab('entregadores');
    </script>
</body>
</html>
