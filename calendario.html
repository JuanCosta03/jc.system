<div>
    <div class="calendar-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 id="calendarMonthYear"></h3>
        <div class="calendar-nav">
            <button id="prevMonth" style="background:#f0f2f5; border:none; width:36px; height:36px; border-radius:50%; cursor:pointer;"><i class="fas fa-chevron-left"></i></button>
            <button id="nextMonth" style="background:#f0f2f5; border:none; width:36px; height:36px; border-radius:50%; cursor:pointer;"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
    <div class="calendar-weekdays" style="display: grid; grid-template-columns: repeat(7,1fr); text-align:center; font-weight:600; margin-bottom:12px;">
        <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
    </div>
    <div id="calendarDays" class="calendar-days" style="display: grid; grid-template-columns: repeat(7,1fr); gap:8px;"></div>
    <div class="legend" style="display: flex; gap:20px; margin-top:20px; justify-content:center;">
        <div class="legend-item"><div class="status-dot" style="width:8px; height:8px; border-radius:50%; background:#adb5bd; display:inline-block;"></div><span>Sem eventos</span></div>
        <div class="legend-item"><div class="status-dot" style="background:#0000FF;"></div><span>Em dia</span></div>
        <div class="legend-item"><div class="status-dot" style="background:#2e7d32;"></div><span>Pago</span></div>
        <div class="legend-item"><div class="status-dot" style="background:#f39c12;"></div><span>A vencer</span></div>
        <div class="legend-item"><div class="status-dot" style="background:#c62828;"></div><span>Atrasado</span></div>
    </div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('profile') || 'geral';
    let currentUser = { id: 'demo' };
    if (typeof getCurrentUser !== 'undefined') currentUser = getCurrentUser();
    
    let currentDate = new Date();
    let currentYear = currentDate.getFullYear();
    let currentMonth = currentDate.getMonth();
    
    function loadTransactions() {
        const stored = localStorage.getItem(`transactions_${currentUser.id}`);
        return stored ? JSON.parse(stored) : [];
    }
    
    function renderCalendar() {
        const transactions = loadTransactions();
        const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        document.getElementById('calendarMonthYear').innerText = `${monthNames[currentMonth]} ${currentYear}`;
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const today = new Date();
        today.setHours(0,0,0,0);
        
        let daysHtml = '';
        for (let i = 0; i < firstDay; i++) daysHtml += '<div></div>';
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayTrans = transactions.filter(t => t.vencimento === dateStr && (profileId === 'geral' || t.perfilId === profileId));
            let status = 'gray';
            let tooltipText = '';
            if (dayTrans.length) {
                const allPaid = dayTrans.every(t => t.pago === true);
                const anyOverdue = dayTrans.some(t => !t.pago && new Date(t.vencimento) < today);
                const anyPending = dayTrans.some(t => !t.pago && new Date(t.vencimento) >= today);
                if (allPaid) status = 'green';
                else if (anyOverdue) status = 'red';
                else if (anyPending) status = 'orange';
                else status = 'blue';
                tooltipText = dayTrans.map(t => `${t.perfilNome}: ${t.nome} (R$ ${t.valor})`).join('<br>');
            }
            const dotColor = { gray:'#adb5bd', green:'#2e7d32', blue:'#0000FF', orange:'#f39c12', red:'#c62828' }[status];
            daysHtml += `<div class="calendar-day" style="background:#f8fafc; border-radius:16px; padding:12px 8px; text-align:center; position:relative; cursor:pointer;">
                <div class="day-number">${d}</div>
                <div class="status-dot" style="background:${dotColor}; width:8px; height:8px; border-radius:50%; display:inline-block; margin-top:6px;"></div>
                ${tooltipText ? `<div class="tooltip" style="position:absolute; background:#1a1a2e; color:white; padding:4px 8px; border-radius:8px; font-size:11px; bottom:100%; left:50%; transform:translateX(-50%); white-space:nowrap; display:none;">${tooltipText}</div>` : ''}
            </div>`;
        }
        document.getElementById('calendarDays').innerHTML = daysHtml;
        // Adicionar eventos de hover para tooltip
        document.querySelectorAll('.calendar-day').forEach(day => {
            day.addEventListener('mouseenter', (e) => {
                const tooltip = day.querySelector('.tooltip');
                if (tooltip) tooltip.style.display = 'block';
            });
            day.addEventListener('mouseleave', (e) => {
                const tooltip = day.querySelector('.tooltip');
                if (tooltip) tooltip.style.display = 'none';
            });
        });
    }
    
    document.getElementById('prevMonth')?.addEventListener('click', () => {
        if (currentMonth === 0) { currentMonth = 11; currentYear--; }
        else currentMonth--;
        renderCalendar();
    });
    document.getElementById('nextMonth')?.addEventListener('click', () => {
        if (currentMonth === 11) { currentMonth = 0; currentYear++; }
        else currentMonth++;
        renderCalendar();
    });
    
    renderCalendar();
</script>
