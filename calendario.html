<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Anual</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:white; border-radius:28px; padding:20px; }
        .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; flex-wrap:wrap; gap:16px; }
        .ano-selector { background:#f0f2f5; padding:8px 20px; border-radius:40px; display:flex; align-items:center; gap:12px; }
        .ano-selector select { padding:8px 16px; border-radius:30px; border:1px solid #ddd; font-size:16px; }
        .legendas { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; margin-bottom:20px; }
        .legenda-item { display:flex; align-items:center; gap:8px; font-size:12px; }
        .legenda-cor { width:14px; height:14px; border-radius:50%; }
        .tabela-wrapper { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; min-width:800px; }
        th, td { border:1px solid #e2e8f0; padding:8px 4px; text-align:center; }
        th { background:#f1f5f9; font-weight:600; }
        .status-bolinha { width:20px; height:20px; border-radius:50%; display:inline-block; }
        .sem-evento { background-color:#adb5bd; }
        .em-dia { background-color:#0000FF; }
        .pago { background-color:#2e7d32; }
        .a-vencer { background-color:#f39c12; }
        .atrasado { background-color:#c62828; }
        .sem-dia { background-color:transparent; }
        .rodape { margin-top:20px; text-align:center; font-size:12px; color:#6c757d; }
    </style>
</head>
<body>
    <div class="cal-header">
        <div class="ano-selector"><span>📅 Ano:</span><select id="anoSelect"></select></div>
        <div class="legendas">
            <div class="legenda-item"><div class="legenda-cor sem-evento"></div><span>Sem eventos</span></div>
            <div class="legenda-item"><div class="legenda-cor em-dia"></div><span>Em dia</span></div>
            <div class="legenda-item"><div class="legenda-cor pago"></div><span>Pago</span></div>
            <div class="legenda-item"><div class="legenda-cor a-vencer"></div><span>A vencer</span></div>
            <div class="legenda-item"><div class="legenda-cor atrasado"></div><span>Atrasado</span></div>
        </div>
    </div>
    <div class="tabela-wrapper" id="tabelaWrapper"><div style="text-align:center; padding:40px;">Carregando...</div></div>
    <div class="rodape">* Cores baseadas nas transações do perfil selecionado.</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('profile') || 'geral';
        let currentUser = null;
        if (typeof getCurrentUser !== 'undefined') {
            currentUser = getCurrentUser();
        } else {
            const userStr = localStorage.getItem('jcsystem_current_user');
            currentUser = userStr ? JSON.parse(userStr) : null;
        }
        if (!currentUser) window.location.href = 'login.html';

        function getTransactions() {
            const stored = localStorage.getItem(`transactions_${currentUser.id}`);
            return stored ? JSON.parse(stored) : [];
        }

        function getDayStatus(transactions, dateStr, today) {
            const dayTrans = transactions.filter(t => t.vencimento === dateStr);
            if (dayTrans.length === 0) return 'gray';
            const allPaid = dayTrans.every(t => t.pago === true);
            const anyOverdue = dayTrans.some(t => !t.pago && new Date(t.vencimento) < today);
            const anyPending = dayTrans.some(t => !t.pago && new Date(t.vencimento) >= today);
            if (allPaid) return 'green';
            if (anyOverdue) return 'red';
            if (anyPending) return 'orange';
            return 'blue';
        }

        function statusToClass(status) {
            const map = { gray:'sem-evento', blue:'em-dia', green:'pago', orange:'a-vencer', red:'atrasado' };
            return map[status] || 'sem-evento';
        }

        function renderCalendar(ano) {
            const transactions = getTransactions();
            const filtered = profileId === 'geral' ? transactions : transactions.filter(t => t.perfilId === profileId);
            const today = new Date(); today.setHours(0,0,0,0);
            const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
            const diasPorMes = [];
            for (let m = 0; m < 12; m++) diasPorMes.push(new Date(ano, m+1, 0).getDate());
            const maxDias = Math.max(...diasPorMes);
            let html = '<table><thead><tr><th>Dia</th>';
            for (let m = 0; m < 12; m++) html += `<th>${meses[m]}</th>`;
            html += '</tr></thead><tbody>';
            for (let dia = 1; dia <= maxDias; dia++) {
                html += `<tr><td style="font-weight:600; background:#f8fafc;">${dia}</td>`;
                for (let mes = 0; mes < 12; mes++) {
                    if (dia > diasPorMes[mes]) {
                        html += `<td><div class="status-bolinha sem-dia"></div></td>`;
                        continue;
                    }
                    const mesStr = (mes+1) < 10 ? '0'+(mes+1) : ''+(mes+1);
                    const diaStr = dia < 10 ? '0'+dia : ''+dia;
                    const dataStr = `${ano}-${mesStr}-${diaStr}`;
                    const status = getDayStatus(filtered, dataStr, today);
                    const classe = statusToClass(status);
                    html += `<td><div class="status-bolinha ${classe}"></div></td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('tabelaWrapper').innerHTML = html;
        }

        function populateYearSelect() {
            const select = document.getElementById('anoSelect');
            if (!select) return;
            const currentYear = new Date().getFullYear();
            select.innerHTML = '';
            for (let y = 2015; y <= currentYear + 5; y++) {
                const option = document.createElement('option');
                option.value = y;
                option.textContent = y;
                if (y === currentYear) option.selected = true;
                select.appendChild(option);
            }
            select.addEventListener('change', (e) => renderCalendar(parseInt(e.target.value)));
            renderCalendar(currentYear);
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', populateYearSelect);
        else populateYearSelect();
    </script>
</body>
</html>
