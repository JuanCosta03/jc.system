<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Financeiro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .calendario-wrapper {
            font-family: 'Inter', sans-serif;
            background: white;
            border-radius: 28px;
            padding: 20px;
        }
        /* Cabeçalho do calendário */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .month-year {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #f0f2f5;
            padding: 6px 16px;
            border-radius: 40px;
        }
        .month-year select {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            font-weight: 500;
        }
        .nav-buttons button {
            background: #f0f2f5;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            margin: 0 4px;
            font-weight: bold;
        }
        /* Legendas */
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        /* Grade do calendário */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            margin-bottom: 12px;
            color: #4a5568;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }
        .calendar-day {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .calendar-day:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        .day-number {
            font-weight: 600;
            font-size: 16px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-top: 6px;
        }
        /* Modal de transações */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-content h3 {
            margin-bottom: 16px;
            color: #0000FF;
        }
        .modal-content .close-modal {
            float: right;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .transaction-list {
            list-style: none;
            margin-top: 16px;
        }
        .transaction-list li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
        .empty-day {
            text-align: center;
            padding: 20px;
            color: #6c757d;
        }
        @media (max-width: 768px) {
            .calendar-day {
                min-height: 60px;
                padding: 6px 2px;
            }
            .day-number {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
<div class="calendario-wrapper">
    <!-- Cabeçalho com seletor de mês/ano -->
    <div class="cal-header">
        <div class="month-year">
            <select id="monthSelect"></select>
            <select id="yearSelect"></select>
        </div>
        <div class="nav-buttons">
            <button id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
            <button id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- Legendas -->
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#adb5bd;"></div><span>Sem eventos</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#0000FF;"></div><span>Em dia</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#2e7d32;"></div><span>Pago</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#f39c12;"></div><span>A vencer</span></div>
        <div class="legend-item"><div class="legend-color" style="background:#c62828;"></div><span>Atrasado</span></div>
    </div>

    <!-- Dias da semana -->
    <div class="weekdays">
        <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
    </div>

    <!-- Grade do calendário -->
    <div id="calendarGrid" class="calendar-grid"></div>
</div>

<!-- Modal de transações do dia -->
<div id="transactionModal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-modal">&times;</button>
        <h3 id="modalDateTitle"></h3>
        <div id="modalTransactions"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
<script>
    // Obter perfil selecionado da URL
    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('profile') || 'geral';

    // Obter usuário atual
    let currentUser = null;
    if (typeof getCurrentUser !== 'undefined') {
        currentUser = getCurrentUser();
    } else {
        const userStr = localStorage.getItem('jcsystem_current_user');
        currentUser = userStr ? JSON.parse(userStr) : null;
    }
    if (!currentUser) {
        // Fallback: redirecionar para login
        window.location.href = 'login.html';
    }

    // Datas atuais
    let currentDate = new Date();
    let currentYear = currentDate.getFullYear();
    let currentMonth = currentDate.getMonth(); // 0-11

    // Carregar transações do usuário
    function getTransactions() {
        const stored = localStorage.getItem(`transactions_${currentUser.id}`);
        return stored ? JSON.parse(stored) : [];
    }

    // Salvar transações (caso edite via modal futuramente)
    function saveTransactions(transactions) {
        localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(transactions));
    }

    // Obter status do dia baseado nas transações
    function getDayStatus(transactions, dateStr, today) {
        const dayTrans = transactions.filter(t => t.vencimento === dateStr);
        if (dayTrans.length === 0) return 'gray';
        const allPaid = dayTrans.every(t => t.pago === true);
        const anyOverdue = dayTrans.some(t => !t.pago && new Date(t.vencimento) < today);
        const anyPending = dayTrans.some(t => !t.pago && new Date(t.vencimento) >= today);
        if (allPaid) return 'green';
        if (anyOverdue) return 'red';
        if (anyPending) return 'orange';
        return 'blue';
    }

    // Renderizar o calendário
    function renderCalendar() {
        const transactions = getTransactions();
        // Filtrar pelo perfil selecionado
        const filtered = profileId === 'geral' ? transactions : transactions.filter(t => t.perfilId === profileId);

        const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0 = domingo
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const today = new Date();
        today.setHours(0,0,0,0);

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        // Dias vazios no início
        for (let i = 0; i < firstDay; i++) {
            const emptyDiv = document.createElement('div');
            emptyDiv.style.background = 'transparent';
            grid.appendChild(emptyDiv);
        }

        // Dias do mês
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const status = getDayStatus(filtered, dateStr, today);
            let dotColor = '';
            switch(status) {
                case 'gray': dotColor = '#adb5bd'; break;
                case 'green': dotColor = '#2e7d32'; break;
                case 'blue': dotColor = '#0000FF'; break;
                case 'orange': dotColor = '#f39c12'; break;
                case 'red': dotColor = '#c62828'; break;
                default: dotColor = '#adb5bd';
            }

            const dayDiv = document.createElement('div');
            dayDiv.className = 'calendar-day';
            dayDiv.innerHTML = `
                <div class="day-number">${d}</div>
                <div class="status-dot" style="background:${dotColor}"></div>
            `;
            dayDiv.addEventListener('click', () => showDayTransactions(dateStr, filtered));
            grid.appendChild(dayDiv);
        }
    }

    // Exibir modal com transações do dia
    function showDayTransactions(dateStr, allTransactions) {
        const dayTrans = allTransactions.filter(t => t.vencimento === dateStr);
        const modal = document.getElementById('transactionModal');
        const modalTitle = document.getElementById('modalDateTitle');
        const modalContent = document.getElementById('modalTransactions');

        const formattedDate = new Date(dateStr).toLocaleDateString('pt-BR');
        modalTitle.innerText = `Transações - ${formattedDate}`;

        if (dayTrans.length === 0) {
            modalContent.innerHTML = '<div class="empty-day">Nenhuma transação para este dia.</div>';
        } else {
            let html = '<ul class="transaction-list">';
            dayTrans.forEach(t => {
                const statusText = t.pago ? '✅ Pago' : (new Date(t.vencimento) < new Date() ? '⚠️ Atrasado' : '⏳ Pendente');
                html += `
                    <li>
                        <div>
                            <strong>${t.nome}</strong><br>
                            <small>Perfil: ${t.perfilNome}</small><br>
                            <small>Categoria: ${t.categoria || '-'}</small>
                        </div>
                        <div style="text-align:right;">
                            R$ ${t.valor.toFixed(2)}<br>
                            <span style="font-size:12px;">${statusText}</span>
                        </div>
                    </li>
                `;
            });
            html += '</ul>';
            modalContent.innerHTML = html;
        }
        modal.style.display = 'flex';
    }

    // Fechar modal
    document.querySelector('.close-modal')?.addEventListener('click', () => {
        document.getElementById('transactionModal').style.display = 'none';
    });
    window.onclick = (event) => {
        const modal = document.getElementById('transactionModal');
        if (event.target === modal) modal.style.display = 'none';
    };

    // Preencher selects de mês e ano
    function populateSelectors() {
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const months = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        monthSelect.innerHTML = '';
        months.forEach((m, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = m;
            if (idx === currentMonth) option.selected = true;
            monthSelect.appendChild(option);
        });
        const currentYearNum = new Date().getFullYear();
        for (let y = currentYearNum - 5; y <= currentYearNum + 5; y++) {
            const option = document.createElement('option');
            option.value = y;
            option.textContent = y;
            if (y === currentYear) option.selected = true;
            yearSelect.appendChild(option);
        }
        monthSelect.addEventListener('change', () => {
            currentMonth = parseInt(monthSelect.value);
            renderCalendar();
        });
        yearSelect.addEventListener('change', () => {
            currentYear = parseInt(yearSelect.value);
            renderCalendar();
        });
    }

    // Navegação pelos botões
    document.getElementById('prevMonthBtn')?.addEventListener('click', () => {
        if (currentMonth === 0) {
            currentMonth = 11;
            currentYear--;
        } else {
            currentMonth--;
        }
        document.getElementById('monthSelect').value = currentMonth;
        document.getElementById('yearSelect').value = currentYear;
        renderCalendar();
    });
    document.getElementById('nextMonthBtn')?.addEventListener('click', () => {
        if (currentMonth === 11) {
            currentMonth = 0;
            currentYear++;
        } else {
            currentMonth++;
        }
        document.getElementById('monthSelect').value = currentMonth;
        document.getElementById('yearSelect').value = currentYear;
        renderCalendar();
    });

    // Inicializar
    populateSelectors();
    renderCalendar();
</script>
</body>
</html>
