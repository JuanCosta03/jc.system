<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Anual | JCSystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: white;
            border-radius: 28px;
            padding: 20px;
        }
        .calendario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .ano-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0f2f5;
            padding: 8px 20px;
            border-radius: 40px;
        }
        .ano-selector label {
            font-weight: 600;
        }
        .ano-selector select {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #ddd;
            background: white;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
        }
        .legendas {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .legenda-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .legenda-cor {
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }
        .calendario-tabela {
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 800px;
        }
        th, td {
            border: 1px solid #e2e8f0;
            padding: 8px 4px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background: #f8fafc;
            font-weight: 600;
            position: sticky;
            top: 0;
            background-color: #f1f5f9;
        }
        .mes-coluna {
            background: #eef2ff;
            font-weight: 700;
        }
        .status-bolinha {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            margin: 0 auto;
        }
        .sem-evento { background-color: #adb5bd; }
        .em-dia { background-color: #0000FF; }
        .pago { background-color: #2e7d32; }
        .a-vencer { background-color: #f39c12; }
        .atrasado { background-color: #c62828; }
        .sem-dia { background-color: transparent; }
        .rodape-obs {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #6c757d;
        }
        @media (max-width: 768px) {
            th, td {
                padding: 4px 2px;
                font-size: 10px;
            }
            .status-bolinha {
                width: 14px;
                height: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="calendario-header">
        <div class="ano-selector">
            <label>📅 Ano:</label>
            <select id="anoSelect"></select>
        </div>
        <div class="legendas">
            <div class="legenda-item"><div class="legenda-cor sem-evento"></div><span>Sem eventos</span></div>
            <div class="legenda-item"><div class="legenda-cor em-dia"></div><span>Em dia</span></div>
            <div class="legenda-item"><div class="legenda-cor pago"></div><span>Pago</span></div>
            <div class="legenda-item"><div class="legenda-cor a-vencer"></div><span>A vencer</span></div>
            <div class="legenda-item"><div class="legenda-cor atrasado"></div><span>Atrasado</span></div>
        </div>
    </div>

    <div class="calendario-tabela" id="calendarioContainer">
        <!-- Tabela será gerada dinamicamente -->
        <div style="text-align:center; padding:40px;">Carregando calendário...</div>
    </div>
    <div class="rodape-obs">
        * Cores baseadas nas transações do perfil selecionado. Para ver detalhes, acesse a aba "Transações".
    </div>

    <script>
        // ==================== FUNÇÃO PARA OBTER USUÁRIO ====================
        function getCurrentUser() {
            const userStr = localStorage.getItem('jcsystem_current_user');
            return userStr ? JSON.parse(userStr) : null;
        }

        // ==================== FUNÇÃO PARA OBTER TRANSAÇÕES ====================
        function getTransactions(userId) {
            const stored = localStorage.getItem(`transactions_${userId}`);
            return stored ? JSON.parse(stored) : [];
        }

        // ==================== DETERMINAR STATUS DO DIA ====================
        function getDayStatus(transactions, dateStr, today) {
            const dayTrans = transactions.filter(t => t.vencimento === dateStr);
            if (dayTrans.length === 0) return 'gray';
            const allPaid = dayTrans.every(t => t.pago === true);
            const anyOverdue = dayTrans.some(t => !t.pago && new Date(t.vencimento) < today);
            const anyPending = dayTrans.some(t => !t.pago && new Date(t.vencimento) >= today);
            if (allPaid) return 'green';
            if (anyOverdue) return 'red';
            if (anyPending) return 'orange';
            return 'blue';
        }

        function statusToClass(status) {
            switch(status) {
                case 'gray': return 'sem-evento';
                case 'blue': return 'em-dia';
                case 'green': return 'pago';
                case 'orange': return 'a-vencer';
                case 'red': return 'atrasado';
                default: return 'sem-evento';
            }
        }

        // ==================== RENDERIZAR CALENDÁRIO ANUAL ====================
        function renderCalendarioAnual(ano, profileId) {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                document.getElementById('calendarioContainer').innerHTML = '<div style="text-align:center; padding:40px;">Usuário não autenticado. Faça login.</div>';
                return;
            }
            let transactions = getTransactions(currentUser.id);
            if (profileId !== 'geral') {
                transactions = transactions.filter(t => t.perfilId === profileId);
            }
            const today = new Date();
            today.setHours(0,0,0,0);

            const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            const mesesAbrev = meses.map(m => m.substring(0,3));

            const diasPorMes = [];
            for (let m = 0; m < 12; m++) {
                diasPorMes.push(new Date(ano, m+1, 0).getDate());
            }
            const maxDias = Math.max(...diasPorMes);

            let html = '<table>';
            html += '<thead><tr><th>Dia</th>';
            for (let m = 0; m < 12; m++) {
                html += `<th class="mes-coluna">${mesesAbrev[m]}</th>`;
            }
            html += '<tr></thead><tbody>';

            for (let dia = 1; dia <= maxDias; dia++) {
                html += `<tr><td style="font-weight:600; background:#f8fafc;">${dia}</td>`;
                for (let mes = 0; mes < 12; mes++) {
                    if (dia > diasPorMes[mes]) {
                        html += `<td class="dia-celula"><div class="status-bolinha sem-dia"></div></td>`;
                        continue;
                    }
                    const mesNum = mes + 1;
                    const mesStr = mesNum < 10 ? '0' + mesNum : '' + mesNum;
                    const diaStr = dia < 10 ? '0' + dia : '' + dia;
                    const dataStr = `${ano}-${mesStr}-${diaStr}`;
                    const status = getDayStatus(transactions, dataStr, today);
                    const classe = statusToClass(status);
                    html += `<td class="dia-celula"><div class="status-bolinha ${classe}"></div></td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            document.getElementById('calendarioContainer').innerHTML = html;
        }

        // ==================== POPULAR SELETOR DE ANOS (2015 em diante) ====================
        function popularAnos() {
            const anoAtual = new Date().getFullYear();
            const select = document.getElementById('anoSelect');
            if (!select) return;
            select.innerHTML = '';
            for (let ano = 2015; ano <= anoAtual + 5; ano++) {
                const option = document.createElement('option');
                option.value = ano;
                option.textContent = ano;
                if (ano === anoAtual) option.selected = true;
                select.appendChild(option);
            }
            // Adicionar evento de mudança
            select.addEventListener('change', function(e) {
                const anoSelecionado = parseInt(e.target.value);
                const profileId = obterPerfilDaUrl();
                renderCalendarioAnual(anoSelecionado, profileId);
            });
            // Renderizar com ano atual e perfil da URL
            const profileId = obterPerfilDaUrl();
            renderCalendarioAnual(anoAtual, profileId);
        }

        // ==================== OBTER PERFIL DA URL ====================
        function obterPerfilDaUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('profile') || 'geral';
        }

        // ==================== INICIALIZAR ====================
        popularAnos();
    </script>
</body>
</html>
