<div>
    <div id="emptyMessage" style="text-align:center; padding:60px;">
        <i class="fas fa-chart-line" style="font-size:64px; color:#0000FF; margin-bottom:20px;"></i>
        <h3>Nenhuma transação registrada</h3>
        <p>Adicione transações para visualizar gráficos e estatísticas.</p>
    </div>
    <div id="content" style="display:none;">
        <div class="filter-bar" style="display:flex; justify-content:flex-end; margin-bottom:20px;">
            <select id="periodSelect" style="padding:8px 16px; border-radius:40px; border:1px solid #ddd;">
                <option value="6months">Últimos 6 meses</option>
                <option value="year">Ano atual</option>
            </select>
        </div>
        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; margin-bottom:30px;">
            <div class="card"><h3>💰 Entradas</h3><div id="totalIn" class="kpi-value">R$ 0,00</div></div>
            <div class="card"><h3>📉 Saídas</h3><div id="totalOut" class="kpi-value">R$ 0,00</div></div>
            <div class="card"><h3>⚖️ Saldo</h3><div id="balance" class="kpi-value">R$ 0,00</div></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:30px;">
            <div class="card"><h3>📊 Gastos por Categoria</h3><canvas id="categoryChart" height="200"></canvas></div>
            <div class="card"><h3>📈 Evolução Mensal</h3><canvas id="trendChart" height="200"></canvas></div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('profile') || 'geral';
    let currentUser = window.getCurrentUser ? getCurrentUser() : null;
    if (!currentUser) currentUser = JSON.parse(localStorage.getItem('jcsystem_current_user'));
    
    function getTransactions() {
        const stored = localStorage.getItem(`transactions_${currentUser.id}`);
        return stored ? JSON.parse(stored) : [];
    }
    
    function updateUI() {
        let transactions = getTransactions();
        if (profileId !== 'geral') transactions = transactions.filter(t => t.perfilId === profileId);
        if (transactions.length === 0) {
            document.getElementById('emptyMessage').style.display = 'block';
            document.getElementById('content').style.display = 'none';
            return;
        }
        document.getElementById('emptyMessage').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        // ... resto do código para calcular totais e gráficos (igual ao anterior, mas com dados reais)
    }
    updateUI();
</script>
