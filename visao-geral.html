<div>
    <div class="filter-bar" style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
        <select id="periodSelect" style="padding: 8px 16px; border-radius: 40px; border: 1px solid #ddd;">
            <option value="6months">Últimos 6 meses</option>
            <option value="year">Ano atual</option>
        </select>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
        <div class="card" style="background: white; border-radius: 24px; padding: 20px; text-align: center;"><h3>💰 Entradas</h3><div id="totalIn" class="kpi-value" style="font-size:32px; font-weight:800; color:#0000FF;">R$ 0,00</div></div>
        <div class="card" style="background: white; border-radius: 24px; padding: 20px; text-align: center;"><h3>📉 Saídas</h3><div id="totalOut" class="kpi-value" style="font-size:32px; font-weight:800; color:#0000FF;">R$ 0,00</div></div>
        <div class="card" style="background: white; border-radius: 24px; padding: 20px; text-align: center;"><h3>⚖️ Saldo</h3><div id="balance" class="kpi-value" style="font-size:32px; font-weight:800;">R$ 0,00</div></div>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 30px;">
        <div class="card" style="background: white; border-radius: 28px; padding: 24px;"><h3>📊 Gastos por Categoria</h3><canvas id="categoryChart" height="200"></canvas></div>
        <div class="card" style="background: white; border-radius: 28px; padding: 24px;"><h3>📈 Evolução Mensal</h3><canvas id="trendChart" height="200"></canvas></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('profile') || 'geral';
    let currentUser = null;
    if (typeof getCurrentUser !== 'undefined') {
        currentUser = getCurrentUser();
    } else {
        const userStr = localStorage.getItem('jcsystem_current_user');
        currentUser = userStr ? JSON.parse(userStr) : null;
    }
    if (!currentUser) window.location.href = 'login.html';

    function getTransactions() {
        const stored = localStorage.getItem(`transactions_${currentUser.id}`);
        return stored ? JSON.parse(stored) : [];
    }

    function updateUI() {
        let transactions = getTransactions();
        if (profileId !== 'geral') {
            transactions = transactions.filter(t => t.perfilId === profileId);
        }
        const period = document.getElementById('periodSelect').value;
        const now = new Date();
        let startDate;
        if (period === '6months') {
            startDate = new Date(now.getFullYear(), now.getMonth() - 5, 1);
        } else {
            startDate = new Date(now.getFullYear(), 0, 1);
        }
        const periodData = transactions.filter(t => new Date(t.data) >= startDate);
        const totalIn = periodData.filter(t => t.type === 'entrada').reduce((s, t) => s + t.valor, 0);
        const totalOut = periodData.filter(t => t.type === 'saida').reduce((s, t) => s + t.valor, 0);
        const balance = totalIn - totalOut;
        document.getElementById('totalIn').innerHTML = `R$ ${totalIn.toFixed(2)}`;
        document.getElementById('totalOut').innerHTML = `R$ ${totalOut.toFixed(2)}`;
        document.getElementById('balance').innerHTML = `R$ ${balance.toFixed(2)}`;
        document.getElementById('balance').style.color = balance >= 0 ? '#2e7d32' : '#c62828';

        // Gastos por categoria
        const expenses = {};
        periodData.filter(t => t.type === 'saida').forEach(t => {
            const cat = t.categoria || 'Outros';
            expenses[cat] = (expenses[cat] || 0) + t.valor;
        });
        const ctxCat = document.getElementById('categoryChart')?.getContext('2d');
        if (ctxCat) {
            new Chart(ctxCat, {
                type: 'doughnut',
                data: { labels: Object.keys(expenses), datasets: [{ data: Object.values(expenses), backgroundColor: ['#0000FF', '#3366FF', '#4c9aff', '#7ab8ff', '#a3ceff'] }] }
            });
        }

        // Evolução mensal (últimos 6 meses)
        const months = [];
        const monthlyIn = [];
        const monthlyOut = [];
        for (let i = 5; i >= 0; i--) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            months.push(d.toLocaleString('pt-BR', { month: 'short' }));
            monthlyIn.push(0);
            monthlyOut.push(0);
        }
        periodData.forEach(t => {
            const date = new Date(t.data);
            const diff = (now.getFullYear() - date.getFullYear()) * 12 + (now.getMonth() - date.getMonth());
            if (diff >= 0 && diff < 6) {
                const idx = 5 - diff;
                if (t.type === 'entrada') monthlyIn[idx] += t.valor;
                else monthlyOut[idx] += t.valor;
            }
        });
        const ctxTrend = document.getElementById('trendChart')?.getContext('2d');
        if (ctxTrend) {
            new Chart(ctxTrend, {
                type: 'line',
                data: { labels: months, datasets: [{ label: 'Entradas', data: monthlyIn, borderColor: '#2e7d32', fill: false }, { label: 'Saídas', data: monthlyOut, borderColor: '#c62828', fill: false }] }
            });
        }
    }

    document.getElementById('periodSelect').addEventListener('change', updateUI);
    updateUI();
</script>
