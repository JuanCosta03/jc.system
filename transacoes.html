<div>
    <div id="adminArea" style="display: none; margin-bottom: 24px; text-align: right;">
        <button id="showModalBtn" style="background:#0000FF; color:white; border:none; padding:10px 20px; border-radius:40px; cursor:pointer;">
            <i class="fas fa-plus"></i> Nova Transação
        </button>
    </div>
    <h3>📋 Histórico de Transações</h3>
    <div style="overflow-x:auto;">
        <table style="width:100%; border-collapse: collapse;">
            <thead><tr><th>Data</th><th>Nome</th><th>Perfil</th><th>Valor</th><th>Tipo</th><th>Categoria</th></tr></thead>
            <tbody id="transTableBody"><tr><td colspan="6">Carregando...</td></tr></tbody>
        </table>
    </div>
</div>

<div id="transactionModal" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:white; border-radius:32px; max-width:500px; width:90%; padding:24px;">
        <h3>➕ Nova Transação</h3>
        <div style="display:flex; flex-direction:column; gap:12px; margin-top:16px;">
            <input type="text" id="newName" placeholder="Nome" style="padding:10px; border-radius:16px; border:1px solid #ddd;">
            <select id="newType"><option value="entrada">Entrada</option><option value="saida">Saída</option></select>
            <input type="number" id="newValue" placeholder="Valor" step="0.01">
            <input type="date" id="newDate">
            <select id="newProfile"></select>
            <select id="newFixo"><option value="fixa">Fixa</option><option value="variavel">Variável</option></select>
            <select id="newParc"><option value="avista">À vista</option><option value="parcelado">Parcelado</option></select>
            <input type="number" id="newParcelas" placeholder="Nº parcelas" value="1">
            <input type="date" id="newVenc" placeholder="Vencimento">
            <input type="text" id="newCat" placeholder="Categoria">
            <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:16px;">
                <button id="cancelModalBtn" style="background:#e2e8f0; border:none; padding:8px 16px; border-radius:40px;">Cancelar</button>
                <button id="saveTransBtn" style="background:#0000FF; color:white; border:none; padding:8px 16px; border-radius:40px;">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const profileId = urlParams.get('profile') || 'geral';
    let currentUser = null;
    if (typeof getCurrentUser !== 'undefined') {
        currentUser = getCurrentUser();
    } else {
        const userStr = localStorage.getItem('jcsystem_current_user');
        currentUser = userStr ? JSON.parse(userStr) : null;
    }
    if (!currentUser) window.location.href = 'login.html';

    let profilesList = [];
    function loadProfiles() {
        const stored = localStorage.getItem(`profiles_${currentUser.id}`);
        if (stored) {
            profilesList = JSON.parse(stored);
        } else {
            profilesList = [];
        }
        const profileSelect = document.getElementById('newProfile');
        if (profileSelect) {
            profileSelect.innerHTML = profilesList.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }
    }

    function getTransactions() {
        const stored = localStorage.getItem(`transactions_${currentUser.id}`);
        return stored ? JSON.parse(stored) : [];
    }

    function saveTransactions(transactions) {
        localStorage.setItem(`transactions_${currentUser.id}`, JSON.stringify(transactions));
    }

    function renderTransactions() {
        let transactions = getTransactions();
        if (profileId !== 'geral') {
            transactions = transactions.filter(t => t.perfilId === profileId);
        }
        const tbody = document.getElementById('transTableBody');
        if (!transactions.length) {
            tbody.innerHTML = '<tr><td colspan="6">Nenhuma transação registrada</td></tr>';
            return;
        }
        tbody.innerHTML = transactions.map(t => `
            <tr>
                <td>${t.data}</td>
                <td><strong>${t.nome}</strong></td>
                <td>${t.perfilNome}</td>
                <td style="color:${t.type==='entrada'?'green':'red'}">R$ ${t.valor.toFixed(2)}</td>
                <td><span style="background:${t.type==='entrada'?'#e6f7e6':'#fee'}; padding:4px 10px; border-radius:20px;">${t.type==='entrada'?'Receita':'Despesa'}</span></td>
                <td>${t.categoria || '-'}</td>
            </tr>
        `).join('');
    }

    if (profileId === 'geral') {
        document.getElementById('adminArea').style.display = 'block';
        loadProfiles();
    } else {
        document.getElementById('adminArea').style.display = 'none';
    }

    const modal = document.getElementById('transactionModal');
    document.getElementById('showModalBtn')?.addEventListener('click', () => {
        modal.style.display = 'flex';
        loadProfiles(); // atualiza lista de perfis no modal
    });
    document.getElementById('cancelModalBtn')?.addEventListener('click', () => {
        modal.style.display = 'none';
    });
    document.getElementById('saveTransBtn')?.addEventListener('click', () => {
        const nome = document.getElementById('newName').value.trim();
        const type = document.getElementById('newType').value;
        const valor = parseFloat(document.getElementById('newValue').value);
        const data = document.getElementById('newDate').value;
        const perfilIdSel = document.getElementById('newProfile').value;
        const perfilNome = profilesList.find(p => p.id === perfilIdSel)?.name || 'Perfil';
        const fixo = document.getElementById('newFixo').value;
        const parc = document.getElementById('newParc').value;
        const parcelas = parseInt(document.getElementById('newParcelas').value) || 1;
        const venc = document.getElementById('newVenc').value || data;
        const cat = document.getElementById('newCat').value.trim() || 'Outros';
        if (!nome || isNaN(valor) || !data) {
            alert('Preencha nome, valor e data');
            return;
        }
        const newTrans = {
            id: Date.now(),
            nome, type, valor, data, perfilId: perfilIdSel, perfilNome,
            fixoVariavel: fixo, parcelamento: parc, parcelas, vencimento: venc,
            pago: false, categoria: cat
        };
        let transactions = getTransactions();
        transactions.push(newTrans);
        saveTransactions(transactions);
        renderTransactions();
        modal.style.display = 'none';
        document.getElementById('newName').value = '';
        document.getElementById('newValue').value = '';
        document.getElementById('newDate').value = '';
        document.getElementById('newVenc').value = '';
        document.getElementById('newCat').value = '';
    });
    renderTransactions();
</script>
