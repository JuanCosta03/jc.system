<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | JCSystem</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .register-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0F5FF, #E8EFFF);
            padding: 20px;
        }
        .register-card {
            max-width: 500px;
            background: white;
            border-radius: 24px;
            padding: 40px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 12px; }
        .btn-register { width: 100%; padding: 12px; background: var(--blue-primary); color: white; border: none; border-radius: 12px; font-weight: 600; }
        .message { margin-top: 16px; padding: 12px; border-radius: 12px; text-align: center; }
        .error { background: #FEE2E2; color: #DC2626; }
        .success { background: #D1FAE5; color: #059669; }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <div class="register-card">
            <h1>Criar Conta</h1>
            <p>Teste grátis por 30 dias</p>
            <form id="registerForm">
                <div class="form-group"><input type="text" id="name" placeholder="Nome completo" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="E-mail" required></div>
                <div class="form-group"><input type="password" id="password" placeholder="Senha (mínimo 6 caracteres)" required></div>
                <div class="form-group"><input type="password" id="confirm" placeholder="Confirmar senha" required></div>
                <div style="margin: 20px 0;">
                    <select id="plan">
                        <option value="familiar">Familiar - R$14,99/mês</option>
                        <option value="empresarial">Empresarial - R$350/mês</option>
                    </select>
                </div>
                <button type="submit" class="btn-register">Criar conta grátis</button>
            </form>
            <div id="message"></div>
            <div style="text-align:center; margin-top:20px;"><a href="login.html">Já tem conta? Faça login</a></div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const plan = document.getElementById('plan').value;
            const price = plan === 'familiar' ? '14.99' : '350';
            if (!name || !email || !pwd) return showMessage('Preencha todos os campos', 'error');
            if (pwd !== confirm) return showMessage('Senhas não coincidem', 'error');
            if (pwd.length < 6) return showMessage('Senha deve ter pelo menos 6 caracteres', 'error');
            const user = register(email, pwd, name, plan, price);
            if (user) {
                showMessage('Cadastro realizado! Redirecionando...', 'success');
                setTimeout(() => {
                    if (plan === 'familiar') location.href = 'dashboard-pessoal.html';
                    else location.href = 'dashboard-empresarial.html';
                }, 1500);
            } else {
                showMessage('E-mail já cadastrado. Use outro.', 'error');
            }
        });
        function showMessage(msg, type) {
            const div = document.getElementById('message');
            div.textContent = msg;
            div.className = `message ${type}`;
            setTimeout(() => div.innerHTML = '', 3000);
        }
    </script>
</body>
</html>
